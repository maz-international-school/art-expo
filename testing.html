<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO 2026 | LIVE RANKINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:#fff; padding:0; overflow-y: auto; cursor: none;">

    <!-- BOLD COLOR AURA LAYER (Blocks the "Big Guys" concerns) -->
    <div style="position: fixed; top:0; left:0; width:100%; height:100%; z-index: 1; pointer-events: none;">
        <div class="vivid-shape" style="background: var(--blue); width: 600px; height: 600px; top: -200px; left: -100px; animation: drift 25s infinite linear;"></div>
        <div class="vivid-shape" style="background: var(--yellow); width: 400px; height: 400px; bottom: 50px; right: -100px; animation: drift 20s infinite reverse ease-in-out;"></div>
        <div class="vivid-shape" style="background: var(--red); width: 500px; height: 100px; top: 40%; left: -100px; transform: rotate(-25deg); opacity: 0.4;"></div>
    </div>

    <!-- THE LOGO ANCHOR (Blocks Gemini) -->
    <img src="image1.png" class="school-logo" alt="Logo" style="bottom: 55px !important; right: 15px !important; z-index: 100;">

    <!-- THE DOTTED GRID (Over the colors for the Arty Look) -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(0,0,0,0.2) 1.5px, transparent 1px); background-size: 30px 30px; z-index: 2; pointer-events: none;"></div>

    <div style="min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 5;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 12px solid var(--red); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">ART EXPO 2026</div>
            <div id="ticker-total-box" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 8px 30px; border: 4px solid white;">
                TOTAL: <span id="master-total-ticker">0</span>
            </div>
        </div>

        <!-- 13-PRIZE DYNAMIC WALL -->
        <div id="champion-wall" style="flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 40px;">
            <!-- Content Injected -->
        </div>

        <!-- FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 70px; overflow: hidden; display: flex; align-items: center; border-top: 8px solid var(--black); z-index: 10;">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 3px;">
                LIVE EXHIBITION STANDINGS • JALAN KRISTAL SHAH ALAM • CAST YOUR VOTE VIA THE OFFICIAL QR CODE • SUPPORTING YOUNG ARTISTS
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let globalTotal = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id);
                const sorted = students.sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                const topScore = sorted.length > 0 ? (sorted[0].voteCount || 0) : 0;
                students.forEach(s => globalTotal += (s.voteCount || 0));

                const leaders = sorted.filter(s => s.voteCount === topScore && topScore > 0);

                const card = document.createElement('div');
                card.className = "gallery-card";
                card.style.borderTop = `15px solid ${getCol(g.c)}`; // Thicker top border for "COLOR"
                
                let nameDisplay = topScore === 0 ? '<span style="opacity:0.2">---</span>' : (leaders.length === 1 ? leaders[0].artist : "JOINT LEADERS");
                let titleDisplay = topScore === 0 ? "Awaiting Selection" : (leaders.length === 1 ? leaders[0].title : `${leaders.length} Artists Tied`);

                card.innerHTML = `
                    <div style="font-family:'Archivo Black'; font-size:0.9rem; color:${getCol(g.c)}; margin-bottom:10px;">${g.l}</div>
                    <div class="winner-name">${nameDisplay}</div>
                    <div class="winner-title">${titleDisplay}</div>
                    <div class="card-footer">
                        <div class="vote-badge">${topScore}</div>
                        <div class="booth-tag">${leaders.length === 1 ? leaders[0].id : ''}</div>
                    </div>
                `;
                wall.appendChild(card);
            });
            document.getElementById('master-total-ticker').innerText = globalTotal;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .vivid-shape { position: absolute; border-radius: 50%; opacity: 0.3; filter: blur(60px); z-index: 1; }
        @keyframes drift {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(50px, 50px) rotate(15deg); }
        }

        .gallery-card { 
            background: white; border: 6px solid var(--black); box-shadow: 12px 12px 0px var(--black); 
            display: flex; flex-direction: column; padding: 25px; min-height: 220px; box-sizing: border-box; 
            animation: popIn 0.5s ease-out backwards;
        }
        .winner-name { font-weight: 900; font-size: 1.6rem; line-height: 1; text-transform: uppercase; margin-top: 10px; color: var(--black); }
        .winner-title { font-size: 0.8rem; opacity: 0.5; font-weight: 700; margin-top: 8px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .vote-badge { font-family: 'Archivo Black'; font-size: 4rem; line-height: 0.8; color: var(--black); }
        .booth-tag { font-size: 0.7rem; border: 3px solid black; padding: 4px 10px; font-weight: 900; background: var(--black); color: white; }
        
        .scrolling-text { white-space: nowrap; animation: scroll-left 35s linear infinite; padding-left: 100%; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</body>
</html>

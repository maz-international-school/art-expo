<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | STANDINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="watercolor-bauhaus">

    <!-- THE 3x3 LOGO ANCHOR (Blocks Gemini Watermark) -->
    <img src="image1.png" class="school-logo" alt="Logo" style="bottom: 55px !important; right: 15px !important; z-index: 1000; opacity: 1 !important;">

    <!-- DOTTED GRID OVERLAY -->
    <div class="blueprint-overlay"></div>

    <div class="results-wrapper">
        <!-- HEADER -->
        <header class="bauhaus-header">
            <div class="header-main">
                <div class="red-bar-accent"></div>
                <h1>MAZ ART EXPO 2026</h1>
                <div class="vote-stamp">
                    <small>TOTAL TALLIED</small>
                    <span id="master-total-ticker">0</span>
                </div>
            </div>
            <p class="nav-hint">PRESS SPACEBAR TO SCROLL TO NEXT YEAR</p>
        </header>

        <!-- SCROLLABLE FEED -->
        <main id="standings-feed">
            <!-- Year Groups with >0 votes appear here -->
        </main>

        <footer class="exhibition-footer">
            <p>© 2026 MAZ INTERNATIONAL SCHOOL • LIVE DATA STREAM • SECURE ON-SITE VOTING</p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;
            let activeYears = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                    .sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                students.forEach(s => globalTotal += (s.voteCount || 0));
                if (students.length === 0) return;
                activeYears++;

                const topScore = students[0].voteCount;
                const leaders = students.filter(s => s.voteCount === topScore);
                const runners = students.filter(s => s.voteCount < topScore && s.voteCount > 0);

                const section = document.createElement('div');
                section.className = "exhibit-card";

                // TIE LOGIC
                let nameHTML = "";
                let titleHTML = "";
                let statusTag = "";

                if (leaders.length === 1) {
                    nameHTML = leaders[0].artist;
                    titleHTML = leaders[0].title || 'Untitled';
                    statusTag = 'LEADER';
                } else if (leaders.length <= 2) {
                    nameHTML = leaders.map(l => l.artist).join(" & ");
                    titleHTML = "JOINT LEADERS";
                    statusTag = '2-WAY TIE';
                } else {
                    nameHTML = `${leaders.length}-WAY TIE`;
                    titleHTML = "VOTE TO BREAK THE LOCK";
                    statusTag = 'MASS TIE';
                }

                section.innerHTML = `
                    <div class="exhibit-header" style="background:${getCol(g.c)}">
                        <span>${g.l}</span>
                        <div class="card-status">${statusTag}</div>
                    </div>
                    <div class="exhibit-main">
                        <div class="artist-block">
                            <h2 class="winner-name">${nameHTML}</h2>
                            <p class="winner-title">"${titleHTML}"</p>
                        </div>
                        <div class="winner-score" style="color:${getCol(g.c)}">${topScore}</div>
                    </div>
                    ${runners.length > 0 ? `
                        <div class="runners-tray">
                            ${runners.slice(0, 3).map((s, i) => `
                                <div class="runner-row">
                                    <span class="r-rank">#${leaders.length + i + 1}</span>
                                    <span class="r-name">${s.artist}</span>
                                    <span class="r-v">${s.voteCount}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                `;
                feed.appendChild(section);
            });

            if (activeYears === 0) {
                feed.innerHTML = `<div class="awaiting">AWAITING<br>FIRST<br>SELECTION</div>`;
            }
            document.getElementById('master-total-ticker').innerText = globalTotal;
        });

        // SPACEBAR SMART SCROLL
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" || e.keyCode === 32) {
                e.preventDefault();
                const cards = document.querySelectorAll('.exhibit-card');
                const scrollPos = window.scrollY + 200;
                for (let card of cards) {
                    if (card.offsetTop > scrollPos) {
                        window.scrollTo({ top: card.offsetTop - 40, behavior: 'smooth' });
                        break;
                    }
                }
            }
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

    <style>
        .watercolor-bauhaus {
            background: #fff url('watercolor-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            scroll-behavior: smooth;
        }

        .blueprint-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(rgba(0,0,0,0.15) 1.2px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1; pointer-events: none;
        }

        .results-wrapper { position: relative; z-index: 5; max-width: 1000px; margin: 0 auto; padding: 60px 40px; }

        /* HEADER */
        .results-header { margin-bottom: 80px; text-align: left; }
        .header-main { display: flex; align-items: center; gap: 40px; position: relative; }
        .red-bar-accent { width: 15px; height: 120px; background: var(--red); }
        h1 { font-family: 'Archivo Black'; font-size: 5.5rem; line-height: 0.8; margin: 0; letter-spacing: -6px; color: #000; }
        
        .vote-stamp { background: var(--yellow); border: 8px solid #000; padding: 15px 30px; transform: rotate(5deg); box-shadow: 15px 15px 0 #000; }
        .vote-stamp small { display: block; font-weight: 900; font-size: 0.8rem; letter-spacing: 2px; }
        .vote-stamp span { font-family: 'Archivo Black'; font-size: 4rem; line-height: 1; }

        .nav-hint { font-weight: 900; font-size: 0.7rem; letter-spacing: 5px; opacity: 0.4; margin-top: 30px; color: #000; }

        /* CARDS */
        #standings-feed { display: flex; flex-direction: column; gap: 100px; }
        .exhibit-card { background: white; border: 10px solid #000; box-shadow: 30px 30px 0px #000; position: relative; animation: slideIn 0.8s ease-out backwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .exhibit-header { font-family: 'Archivo Black'; font-size: 1.8rem; color: #fff; padding: 12px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid #000; }
        .card-status { background: #000; color: #fff; padding: 4px 15px; font-size: 0.8rem; letter-spacing: 3px; font-weight: 900; }

        .exhibit-main { padding: 60px; display: flex; justify-content: space-between; align-items: center; }
        .winner-name { font-family: 'Archivo Black'; font-size: 4.2rem; line-height: 0.9; letter-spacing: -3px; text-transform: uppercase; margin: 0; color: #000; }
        .winner-title { font-size: 1.6rem; font-weight: 600; opacity: 0.3; margin-top: 15px; text-transform: uppercase; color: #000; }
        .winner-score { font-family: 'Archivo Black'; font-size: 9rem; line-height: 0.8; letter-spacing: -6px; }

        .runners-tray { background: #000; color: #fff; padding: 25px 60px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; }
        .runner-row { display: flex; justify-content: space-between; align-items: center; }
        .r-name { font-weight: 900; text-transform: uppercase; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 15px;}
        .r-rank { font-family: 'Archivo Black'; color: var(--red); font-size: 0.8rem; }
        .r-v { font-family: 'Archivo Black'; opacity: 0.6; }

        .awaiting { padding: 200px 0; text-align: center; font-family: 'Archivo Black'; font-size: 7rem; line-height: 0.8; opacity: 0.1; letter-spacing: -5px; color: #000; }
        .exhibition-footer { padding: 80px 0; text-align: center; opacity: 0.3; font-weight: 900; font-size: 0.7rem; letter-spacing: 3px; color: #000; }
    </style>
</body>
</html>

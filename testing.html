<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO 2026 | LIVE CHAOS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="studio-canvas">

    <!-- THE CHAOS LAYER (Splotches & Splatters) -->
    <div class="chaos-overlay">
        <div class="splotch splotch-red"></div>
        <div class="splotch splotch-blue"></div>
        <div class="splotch splotch-yellow"></div>
        <div class="splatter splat-1"></div>
        <div class="splatter splat-2"></div>
        <div class="splatter splat-3"></div>
        <div class="drip-line"></div>
    </div>

    <!-- THE 3x3 COLOR LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo" style="bottom: 55px !important; right: 15px !important; z-index: 1000; opacity: 1 !important;">

    <div class="exhibition-content">
        <!-- HEADER -->
        <header class="chaos-header">
            <div class="header-inner">
                <div class="red-block"></div>
                <h1>MAZ ART EXPO 2026</h1>
                <div class="vote-total-stamp">
                    <small>TOTAL TALLIED</small>
                    <span id="master-total-ticker">0</span>
                </div>
            </div>
            <p class="nav-hint">SPACEBAR TO EXPLORE GALLERY</p>
        </header>

        <!-- STANDINGS FEED -->
        <main id="champion-wall">
            <!-- Year Groups with >0 votes appear here -->
        </main>

        <footer class="chaos-footer">
            <div class="scrolling-text">
                LIVE ACTIVITY DETECTED • JALAN KRISTAL SHAH ALAM • CAST YOUR VOTE VIA THE OFFICIAL EXPO LINK • GEOFENCING ACTIVE • 
            </div>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let globalTotal = 0;
            let activeGroups = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                    .sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                students.forEach(s => globalTotal += (s.voteCount || 0));
                if (students.length === 0) return;
                activeGroups++;

                const topScore = students[0].voteCount;
                const leaders = students.filter(s => s.voteCount === topScore);
                const runners = students.filter(s => s.voteCount < topScore && s.voteCount > 0);

                const section = document.createElement('div');
                section.className = "exhibit-card fade-in";
                section.style.borderTop = `15px solid ${getCol(g.c)}`;

                section.innerHTML = `
                    <div class="year-label">${g.l}</div>
                    <div class="card-body">
                        <div class="leader-info">
                            <span class="status-tag">${leaders.length > 1 ? 'TIE' : 'LEADER'}</span>
                            <div class="artist-name">${leaders.length > 2 ? 'MULTIPLE' : leaders.map(l => l.artist).join(" & ")}</div>
                            <div class="artwork-title">${leaders.length === 1 ? (leaders[0].title || 'Untitled') : leaders.length + ' Artists Drawing'}</div>
                        </div>
                        <div class="score-display" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${topScore}</div>
                    </div>
                    ${runners.length > 0 ? `
                        <div class="runners-tray">
                            ${runners.slice(0, 3).map((s, i) => `
                                <div class="runner-row">
                                    <span class="r-rank">#${leaders.length + i + 1}</span>
                                    <span class="r-name">${s.artist}</span>
                                    <span class="r-score">${s.voteCount}</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                `;
                wall.appendChild(section);
            });

            if (activeGroups === 0) {
                wall.innerHTML = `<div class="awaiting-votes">AWAITING<br>FIRST<br>SELECTION</div>`;
            }
            document.getElementById('master-total-ticker').innerText = globalTotal;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" || e.keyCode === 32) {
                e.preventDefault();
                const cards = document.querySelectorAll('.exhibit-card');
                const scrollPos = window.scrollY + 200;
                for (let card of cards) {
                    if (card.offsetTop > scrollPos) {
                        window.scrollTo({ top: card.offsetTop - 40, behavior: 'smooth' });
                        break;
                    }
                }
            }
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE BROADCAST</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="canvas-grid-body">

    <!-- THE 3x3 COLOR LOGO ANCHOR (Blocks Gemini) -->
    <img src="image1.png" class="school-logo" alt="Logo" style="bottom: 55px !important; right: 20px !important; z-index: 1000; opacity: 1 !important;">

    <!-- THE DYNAMC BROADCAST ENGINE -->
    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 10;">
        
        <!-- HEADER (Opaque Bauhaus Bar) -->
        <div style="background: var(--black); color: white; padding: 25px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 12px solid var(--red); z-index: 20;">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">MAZ ART EXPO 2026</div>
            <div style="display:flex; align-items:center; gap:25px;">
                <div style="font-size:0.8rem; color:var(--white); opacity:0.5; font-family:Montserrat; font-weight:900; letter-spacing:2px;">SPACE TO JUMP</div>
                <div style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 8px 30px; border: 4px solid white;">
                    TOTAL: <span id="master-total-ticker">0</span>
                </div>
            </div>
        </div>

        <!-- BROADCAST STAGE -->
        <div id="broadcast-stage" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 60px; padding: 60px; align-items: center;">
            <!-- Year Groups cycle here -->
        </div>

        <!-- FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 75px; overflow: hidden; display: flex; align-items: center; border-top: 10px solid var(--black); z-index: 20;">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 2rem; text-transform: uppercase; letter-spacing: 4px;">
                START VOTING • MAY THE BEST ARTWORK WIN • WAIT FOR YOUR YEAR TO POP UP! • CAST YOUR VOTE VIA THE OFFICIAL QR CODE • ON-SITE VERIFICATION ACTIVE • 
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        let currentPairIndex = 0;
        let allData = [];
        let autoCycle;

        db.collection('artworks').onSnapshot(snap => {
            allData = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            let total = 0;
            allData.forEach(d => total += (d.voteCount || 0));
            document.getElementById('master-total-ticker').innerText = total;
            renderStage();
        });

        function nextSlide() {
            currentPairIndex += 2;
            if (currentPairIndex >= groups.length) currentPairIndex = 0;
            renderStage();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(autoCycle);
            autoCycle = setInterval(nextSlide, 12000); 
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { e.preventDefault(); nextSlide(); }
        });

        resetTimer();

        function renderStage() {
            const stage = document.getElementById('broadcast-stage');
            stage.innerHTML = "";
            const pair = [groups[currentPairIndex], groups[currentPairIndex + 1]].filter(Boolean);

            pair.forEach(g => {
                const students = allData.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                        .sort((a,b) => b.voteCount - a.voteCount);

                const col = document.createElement('div');
                col.className = "stage-column-new fade-in";
                
                let inner = `<div class="stage-header-new" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${g.l}</div>`;

                if (students.length === 0) {
                    inner += `<div style="margin:auto; opacity:0.1; text-align:center; transform:rotate(-5deg);"><h2 style="font-family:'Archivo Black'; font-size:5rem;">AWAITING<br>VOTES</h2></div>`;
                } else {
                    const topScore = students[0].voteCount;
                    const leaders = students.filter(s => s.voteCount === topScore);
                    
                    let nameHTML = leaders.length === 1 ? leaders[0].artist : (leaders.length <= 2 ? leaders.map(l => l.artist).join(" & ") : "MULTIPLE LEADERS");
                    let titleHTML = leaders.length === 1 ? (leaders[0].title || 'Untitled') : leaders.length + " Artists Tied";
                    let badgeHTML = leaders.length > 1 ? 'JOINT LEADERS' : 'LEADER';

                    inner += `
                        <div class="hero-box">
                            <div class="hero-label" style="color:${getCol(g.c)}">${badgeHTML}</div>
                            <div class="hero-main-row">
                                <div class="hero-info">
                                    <div class="hero-name">${nameHTML}</div>
                                    <div class="hero-title">${titleHTML}</div>
                                </div>
                                <div class="hero-votes-box">
                                    <span class="v-num">${topScore}</span>
                                    <span class="v-label">VOTES</span>
                                </div>
                            </div>
                        </div>
                    `;

                    if (students.length > leaders.length) {
                        inner += `<div class="runners-list">`;
                        students.slice(leaders.length, leaders.length + 2).forEach((s, i) => {
                            inner += `<div class="runner-item"><span>#${leaders.length + i + 1} ${s.artist}</span><span style="color:${getCol(g.c)}">${s.voteCount}</span></div>`;
                        });
                        inner += `</div>`;
                    }
                }
                col.innerHTML = inner;
                stage.appendChild(col);
            });
        }

        function getCol(c) {
            if(c === 'kindergarten') return 'var(--red)';
            if(c === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        /* THE MASTER COMPOSITION: GRID OVER PAINT */
        .canvas-grid-body {
            margin: 0;
            background: #fff url('watercolor-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        .canvas-grid-body::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--black) 1px, transparent 1px), linear-gradient(90deg, var(--black) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            opacity: 0.8; /* Let the paint drops show through the grid */
        }

        /* BRUTALIST CARDS */
        .stage-column-new { 
            display: flex; flex-direction: column; 
            background: rgba(255,255,255,0.98); 
            border: 12px solid var(--black); 
            box-shadow: 40px 40px 0px var(--black); 
            position: relative; overflow: hidden; 
            height: 600px;
        }

        .stage-header-new { font-family: 'Archivo Black'; font-size: 3.5rem; text-align: center; padding: 20px; border-bottom: 12px solid var(--black); }
        
        .hero-box { padding: 40px; flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .hero-label { align-self: flex-start; padding: 5px 15px; font-family: 'Archivo Black'; font-size: 1rem; letter-spacing: 4px; margin-bottom: 15px; border: 3px solid black; }
        
        .hero-main-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; width: 100%; }
        .hero-info { flex: 1; min-width: 0; }
        .hero-name { font-family: 'Archivo Black'; font-size: 4rem; line-height: 1; text-transform: uppercase; word-wrap: break-word; color: var(--black); }
        .hero-title { font-weight: 700; font-size: 1.8rem; opacity: 0.4; text-transform: uppercase; margin-top: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .hero-votes-box { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
        .v-num { font-family: 'Archivo Black'; font-size: 9rem; line-height: 0.8; color: var(--black); }
        .v-label { font-family: 'Archivo Black'; font-size: 1.2rem; }

        .runners-list { background: #f9f9f9; border-top: 10px solid var(--black); padding: 30px 40px; display: flex; flex-direction: column; gap: 12px; }
        .runner-item { display: flex; justify-content: space-between; font-weight: 900; text-transform: uppercase; font-size: 1.8rem; border-bottom: 2px solid #ddd; padding-bottom: 5px; color: var(--black); }
        .runner-item span:first-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 25px; }

        .fade-in { animation: slam 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slam { from { transform: scale(1.15); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .scrolling-text { white-space: nowrap; animation: scroll-left 25s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>ART EXPO 2026</h1>
            <p>Cast your vote for the best piece!</p>
        </header>

        <div class="card" id="voting-card">
            <!-- Step 1: Voter Identity -->
            <div id="step-id">
                <h2>Who is voting?</h2>
                <input type="text" id="voter-id" placeholder="Email or Phone Number" required>
                <button onclick="showBoothInput()">Next</button>
            </div>

            <!-- Step 2: Search Student Name -->
            <div id="step-booth" class="hidden">
                <h2>Find Artist</h2>
                <p style="text-align:left; font-size: 0.8rem; margin-bottom: 10px;">Type the student's name:</p>
                <div style="position: relative;">
                    <input type="text" id="search-input" placeholder="Start typing name..." autocomplete="off">
                    <div id="search-results" class="search-suggestions hidden"></div>
                </div>
            </div>

            <!-- Step 3: Confirmation Polaroid -->
            <div id="step-confirm" class="hidden">
                <div id="artwork-preview"></div>
                <button id="vote-btn" onclick="submitVote()">Confirm Vote</button>
                <button onclick="location.reload()" style="background:none; color: var(--blue); border:none; margin-top:15px; font-size: 0.7rem; text-decoration: underline;">Back to search</button>
            </div>
        </div>

        <!-- Success Message -->
        <div id="success-message" class="card hidden">
            <h2 style="color: var(--red)">VOTE RECORDED!</h2>
            <p style="text-align:left;">Thank you for supporting our young artists.</p>
            <button onclick="location.reload()">Vote in another category</button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>

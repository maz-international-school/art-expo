<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vote | MAZ Art Expo 2026</title>
    
    <!-- LOAD SCRIPTS AT TOP SO FUNCTIONS ARE READY -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Fixed logo path -->
    <img src="./image1.png" class="school-logo" alt="MAZ Logo">

    <div class="container">
        <header>
            <h1>ART EXPO 2026</h1>
            <p id="voter-display" class="hidden" style="font-weight: 900; color: var(--red); margin-top: 10px; font-size: 0.7rem; text-transform: uppercase;"></p>
        </header>

        <div class="card" id="voting-card">
            <div id="step-id">
                <h2>Cast Your Vote</h2>
                <p style="font-size: 0.8rem; margin-bottom: 20px;">Enter your Email or Phone to begin.</p>
                <input type="text" id="voter-id" placeholder="Email or Phone Number">
                <!-- Removed window. prefix for stability -->
                <button type="button" onclick="startVoting()">Vote Now</button>
            </div>

            <div id="step-menu" class="hidden">
                <h2>Select Level</h2>
                <button onclick="pickCategory('kindergarten')" id="btn-kindergarten" style="margin-bottom:15px; background:var(--red);">KINDERGARTEN</button>
                <button onclick="pickCategory('primary')" id="btn-primary" style="margin-bottom:15px; background:var(--blue);">PRIMARY</button>
                <button onclick="pickCategory('secondary')" id="btn-secondary" style="margin-bottom:15px; background:var(--black);">SECONDARY</button>
            </div>

            <div id="step-submenu" class="hidden">
                <h2 id="submenu-title">Select Year</h2>
                <div id="year-buttons-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
                <button onclick="showMenu()" style="background:none; color:var(--black); border:none; text-decoration:underline; font-size:0.7rem; margin-top:20px;">Back to Levels</button>
            </div>

            <div id="step-search" class="hidden">
                <h2 id="search-title">Search</h2>
                <div style="position:relative;">
                    <input type="text" id="search-input" placeholder="Type here..." autocomplete="off">
                    <div id="search-results" class="search-suggestions hidden"></div>
                </div>
                <button onclick="backToSubMenu()" style="background:none; color:var(--red); border:none; text-decoration:underline; font-size:0.7rem; margin-top:20px;">Cancel</button>
            </div>

            <div id="step-confirm" class="hidden">
                <div id="artwork-preview"></div>
                <button type="button" id="vote-btn" onclick="submitVote()">Submit Official Vote</button>
                <button onclick="cancelToSearch()" style="background:none; color:var(--blue); border:none; text-decoration:underline; font-size:0.7rem; margin-top:15px;">Go Back</button>
            </div>
        </div>

        <div id="success-message" class="card hidden">
            <h2 style="color: var(--red)">VOTE RECORDED!</h2>
            <div style="padding: 20px; border: 4px solid var(--black); margin-bottom: 20px; background:#f9f9f9;">
                <p id="success-artist" style="font-size: 1.5rem; font-weight: 900; margin: 8px 0; text-transform: uppercase;"></p>
                <p style="margin:0; font-size: 0.8rem; font-weight: 700;">Group: <span id="success-year" style="color:var(--blue)"></span></p>
            </div>
            <button type="button" onclick="showSubMenu(currentCategory)">Vote in another Year</button>
        </div>
    </div>
</body>
</html>

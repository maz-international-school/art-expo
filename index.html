<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vote | MAZ Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="shape circle"></div>
    <img src="image1.png" class="school-logo" alt="MAZ Logo">

    <div class="container">
        <header>
            <h1>ART EXPO 2026</h1>
            <p id="voter-display" class="hidden"></p>
        </header>

        <div class="card" id="voting-card">
            <div id="step-id">
                <h2>Cast Your Vote</h2>
                <input type="text" id="voter-id" placeholder="Email or Phone Number">
                <button type="button" onclick="window.startVoting()">Enter Expo</button>
            </div>

            <div id="step-menu" class="hidden">
                <h2>Select Level</h2>
                <button onclick="window.showSubMenu('kindergarten')">KINDERGARTEN</button>
                <button onclick="window.showSubMenu('primary')">PRIMARY</button>
                <button onclick="window.showSubMenu('secondary')">SECONDARY</button>
            </div>

            <div id="step-submenu" class="hidden">
                <h2 id="submenu-title"></h2>
                <div id="year-buttons-container"></div>
                <button onclick="window.showMenu()">Back</button>
            </div>

            <div id="step-search" class="hidden">
                <h2 id="search-title">Search</h2>
                <input type="text" id="search-input" placeholder="Type here...">
                <div id="search-results" class="search-suggestions hidden"></div>
            </div>

            <div id="step-confirm" class="hidden">
                <div id="artwork-preview"></div>
                <button type="button" id="vote-btn" onclick="window.submitVote()">Submit Official Vote</button>
            </div>
        </div>

        <div id="success-message" class="card hidden">
            <h2>VOTE RECORDED!</h2>
            <p id="success-artist"></p>
            <p id="success-year"></p>
            <button type="button" onclick="window.showMenu()">Vote in another Year</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>

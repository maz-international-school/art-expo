<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vote | MAZ Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <img src="image1.png" class="school-logo" alt="MAZ Logo">

    <div class="container">
        <header>
            <h1>ART EXPO 2026</h1>
            <p id="voter-display" class="hidden" style="font-weight: 900; color: var(--red); margin-bottom: 10px; font-size: 0.7rem;"></p>
        </header>

        <div class="card" id="voting-card">
            <!-- Step 0: Identity -->
            <div id="step-id">
                <h2>Cast Your Vote</h2>
                <input type="text" id="voter-id" placeholder="Email or Phone Number">
                <button type="button" onclick="window.startVoting()">Vote Now</button>
            </div>

            <!-- Step 1: Category Menu -->
            <div id="step-menu" class="hidden">
                <h2>Select Category</h2>
                <button onclick="window.pickCategory('kindergarten')" id="btn-kindergarten" style="margin-bottom: 15px; background: var(--black);">KINDERGARTEN</button>
                <button onclick="window.pickCategory('primary')" id="btn-primary" style="margin-bottom: 15px; background: var(--black);">PRIMARY SCHOOL</button>
                <button onclick="window.pickCategory('secondary')" id="btn-secondary" style="margin-bottom: 15px; background: var(--black);">SECONDARY SCHOOL</button>
                
            </div>

            <!-- Step 2: Search artist -->
            <div id="step-search" class="hidden">
                <h2 id="search-title">Search</h2>
                <div style="position: relative;">
                    <input type="text" id="search-input" placeholder="Type name..." autocomplete="off">
                    <div id="search-results" class="search-suggestions hidden"></div>
                </div>
                <button onclick="window.showMenu()" style="background:none; color: var(--red); border:none; margin-top:20px; font-size: 0.8rem; text-decoration: underline; cursor:pointer; width: 100%;">Back to Categories</button>
            </div>

            <!-- Step 3: Confirmation -->
            <div id="step-confirm" class="hidden">
                <div id="artwork-preview"></div>
                <button type="button" id="vote-btn" onclick="window.submitVote()">Confirm Vote</button>
                <button type="button" onclick="window.cancelToSearch()" style="background:none; color: var(--blue); border:none; margin-top:15px; font-size: 0.7rem; text-decoration: underline; width: 100%;">Change Selection</button>
            </div>
        </div>

        <div id="success-message" class="card hidden">
            <h2 style="color: var(--red)">SUCCESS!</h2>
            <p>Your vote has been recorded.</p>
            <button type="button" onclick="window.showMenu()">Vote in another category</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vote | MAZ Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>
    <div class="shape circle"></div><div class="shape square"></div><div class="shape triangle"></div>
    <img src="image1.png" class="school-logo" alt="MAZ Logo">

    <div class="container">
        <header>
            <h1>ART EXPO 2026</h1>
            <p id="voter-display" class="hidden" style="font-weight: 900; color: var(--red); margin-top: 10px; font-size: 0.7rem;"></p>
        </header>

        <div class="card" id="voting-card">
            <!-- STEP 0: LOGIN -->
            <div id="step-id">
                <h2>Cast Your Vote</h2>
                <input type="text" id="voter-id" placeholder="Email or Phone Number">
                <button type="button" onclick="window.startVoting()">Vote Now</button>
            </div>

            <!-- STEP 1: MAIN CATEGORIES -->
            <div id="step-menu" class="hidden">
                <h2>Select Category</h2>
                <button onclick="window.showSubMenu('kindergarten')" style="margin-bottom:15px; background:var(--red);">KINDERGARTEN</button>
                <button onclick="window.showSubMenu('primary')" style="margin-bottom:15px; background:var(--blue);">PRIMARY SCHOOL</button>
                <button onclick="window.showSubMenu('secondary')" style="margin-bottom:15px; background:var(--black);">SECONDARY SCHOOL</button>
            </div>

            <!-- STEP 1.5: YEAR SUB-MENU -->
            <div id="step-submenu" class="hidden">
                <h2 id="submenu-title">Select Year</h2>
                <div id="year-buttons-container" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <!-- Year buttons injected here -->
                </div>
                <button onclick="window.showMenu()" style="background:none; color:var(--black); border:none; text-decoration:underline; font-size:0.7rem; margin-top:20px; width:100%;">Back to Categories</button>
            </div>

            <!-- STEP 2: SEARCH -->
            <div id="step-search" class="hidden">
                <h2 id="search-title">Search</h2>
                <p style="font-size:0.7rem; font-weight:900; color:var(--red); margin-bottom:15px;">SEARCH BY BOOTH NO. OR NAME</p>
                <div style="position:relative;">
                    <input type="text" id="search-input" placeholder="e.g. B701 or Ahmad..." autocomplete="off">
                    <div id="search-results" class="search-suggestions hidden"></div>
                </div>
                <button onclick="window.backToSubMenu()" style="background:none; color:var(--red); border:none; text-decoration:underline; font-size:0.7rem; margin-top:20px; width:100%;">Back to Year Groups</button>
            </div>

            <!-- STEP 3: CONFIRM -->
            <div id="step-confirm" class="hidden">
                <div id="artwork-preview"></div>
                <button type="button" id="vote-btn" onclick="window.submitVote()">Confirm Vote</button>
                <button onclick="window.cancelToSearch()" style="background:none; color:var(--blue); border:none; text-decoration:underline; font-size:0.7rem; margin-top:15px; width:100%;">Change Selection</button>
            </div>
        </div>

        <div id="success-message" class="card hidden">
            <h2 style="color: var(--red)">VOTE CAST!</h2>
            <p>Your vote for <span id="success-year" style="color:var(--blue)"></span> has been recorded.</p>
            <button type="button" onclick="window.backToSubMenu()">Vote for another Year</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>

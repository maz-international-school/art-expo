<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE BROADCAST</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="watercolor-bauhaus">

    <!-- THE 3x3 COLOR LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="MAZ Logo" style="bottom: 55px !important; right: 15px !important; z-index: 1000; opacity: 1 !important;">

    <!-- DOTTED GRID OVERLAY -->
    <div class="blueprint-overlay"></div>

    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">MAZ ART EXPO 2026</div>
            <div style="display:flex; align-items:center; gap:25px;">
                <div style="font-size:0.8rem; color:var(--white); opacity:0.3; font-family:Montserrat; font-weight:900; letter-spacing:2px;">SPACE TO JUMP</div>
                <div id="ticker-total-box" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 8px 30px; border: 4px solid white;">
                    TOTAL: <span id="master-total-ticker">0</span>
                </div>
            </div>
        </div>

        <!-- BROADCAST STAGE (2 Columns) -->
        <div id="broadcast-stage" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px; background: transparent;">
            <!-- Year Groups cycle here -->
        </div>

        <!-- FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 70px; overflow: hidden; display: flex; align-items: center; border-top: 8px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px;">
                START VOTING • MAY THE BEST ARTWORK WIN • WAIT FOR YOUR YEAR TO POP UP! • CAST YOUR VOTE VIA THE OFFICIAL QR CODE • ON-SITE VERIFICATION ACTIVE • 
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        let currentPairIndex = 0;
        let allData = [];
        let autoCycle;

        db.collection('artworks').onSnapshot(snap => {
            allData = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            let total = 0;
            allData.forEach(d => total += (d.voteCount || 0));
            document.getElementById('master-total-ticker').innerText = total;
            renderStage();
        });

        function nextSlide() {
            currentPairIndex += 2;
            if (currentPairIndex >= groups.length) currentPairIndex = 0;
            renderStage();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(autoCycle);
            autoCycle = setInterval(nextSlide, 12000); 
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" || e.keyCode === 32) {
                e.preventDefault();
                nextSlide();
            }
        });

        resetTimer();

        function renderStage() {
            const stage = document.getElementById('broadcast-stage');
            stage.innerHTML = "";
            const pair = [groups[currentPairIndex], groups[currentPairIndex + 1]].filter(Boolean);

            pair.forEach(g => {
                const students = allData.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                        .sort((a,b) => b.voteCount - a.voteCount);

                const col = document.createElement('div');
                col.className = "stage-column-new fade-in";
                
                let inner = `<div class="stage-header-new" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${g.l}</div>`;

                if (students.length === 0) {
                    inner += `<div style="margin:auto; opacity:0.1; text-align:center; transform:rotate(-5deg);"><h2 style="font-family:'Archivo Black'; font-size:4rem; color:black;">AWAITING<br>VOTES</h2></div>`;
                } else {
                    const topScore = students[0].voteCount;
                    const leaders = students.filter(s => s.voteCount === topScore);
                    const runners = students.filter(s => s.voteCount < topScore);
                    
                    let nameHTML = leaders.length === 1 ? leaders[0].artist : (leaders.length <= 2 ? leaders.map(l => l.artist).join(" & ") : "MULTIPLE LEADERS");
                    let titleHTML = leaders.length === 1 ? (leaders[0].title || 'Untitled') : leaders.length + " Artists Tied";
                    let badgeHTML = leaders.length > 1 ? 'JOINT LEADERS' : 'LEADER';

                    inner += `
                        <div class="hero-box">
                            <div class="hero-label" style="color:${getCol(g.c)}">${badgeHTML}</div>
                            <div class="hero-main-row">
                                <div class="hero-info">
                                    <div class="hero-name">${nameHTML}</div>
                                    <div class="hero-title">${titleHTML}</div>
                                </div>
                                <div class="hero-votes-box">
                                    <span class="v-num">${topScore}</span>
                                    <span class="v-label">VOTES</span>
                                </div>
                            </div>
                        </div>
                    `;

                    // TIE-AWARE RUNNER LIST
                    if (runners.length > 0) {
                        inner += `<div class="runners-list-tray">`;
                        
                        // We list the top 3 people who aren't the leader
                        runners.slice(0, 3).forEach((s, i) => {
                            // Logic: calculate the real rank based on everyone in the year
                            const realRank = students.findIndex(x => x.voteCount === s.voteCount) + 1;
                            
                            inner += `
                                <div class="runner-cell">
                                    <span class="r-rank" style="color:${getCol(g.c)}">#${realRank}</span>
                                    <span class="r-name">${s.artist}</span>
                                    <span class="r-score">${s.voteCount}</span>
                                </div>
                            `;
                        });
                        inner += `</div>`;
                    }
                }
                col.innerHTML = inner;
                stage.appendChild(col);
            });
        }

        function getCol(c) {
            if(c === 'kindergarten') return 'var(--red)';
            if(c === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .watercolor-bauhaus { background: #fff url('watercolor-bg.jpg') no-repeat center center fixed; background-size: cover; margin: 0; font-family: 'Montserrat', sans-serif; }
        .blueprint-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(0,0,0,0.15) 1.2px, transparent 1px); background-size: 30px 30px; z-index: 1; pointer-events: none; }

        .stage-column-new { display: flex; flex-direction: column; background: white; border: 10px solid var(--black); box-shadow: 20px 20px 0px var(--black); position: relative; overflow: hidden; }
        .stage-header-new { font-family: 'Archivo Black'; font-size: 2.8rem; text-align: center; padding: 15px; border-bottom: 10px solid var(--black); }
        
        .hero-box { padding: 40px; flex: 1; display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .hero-label { align-self: flex-start; padding: 5px 15px; font-family: 'Archivo Black'; font-size: 1rem; letter-spacing: 4px; margin-bottom: 25px; border: 3px solid black; }
        
        .hero-main-row { display: flex; justify-content: space-between; align-items: center; gap: 30px; width: 100%; }
        .hero-info { flex: 1; min-width: 0; }
        .hero-name { font-family: 'Archivo Black'; font-size: 3.5rem; line-height: 1; text-transform: uppercase; word-wrap: break-word; overflow-wrap: break-word; color: var(--black); }
        .hero-title { font-weight: 700; font-size: 1.5rem; opacity: 0.4; text-transform: uppercase; margin-top: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .hero-votes-box { display: flex; align-items: baseline; gap: 10px; flex-shrink: 0; }
        .v-num { font-family: 'Archivo Black'; font-size: 8rem; line-height: 0.8; color: var(--black); }
        .v-label { font-family: 'Archivo Black'; font-size: 1.2rem; color: var(--black); }

        .runners-list-tray { 
            background: var(--black); 
            color: white; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-around; 
            gap: 15px;
            border-top: 6px solid var(--black);
        }
        .runner-cell { display: flex; align-items: center; gap: 8px; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; white-space: nowrap; overflow: hidden;}
        .r-rank { font-family: 'Archivo Black'; }
        .r-name { overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
        .r-score { background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 2px; font-family: 'Archivo Black'; }

        .fade-in { animation: slam 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes slam { from { transform: scale(1.15); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .scrolling-text { white-space: nowrap; animation: scroll-left 25s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 50px 20px; overflow-x: hidden;">

    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="container" style="max-width: 1100px; text-align: left;">
        <header style="margin-bottom: 40px;">
            <h1>EXPO CONTROL</h1>
            <p style="background: var(--red); color: white; display: inline-block; padding: 5px 15px;">Lead Architect Dashboard • MAZ 2026</p>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px;" class="admin-grid">
            <div>
                <div class="card" style="margin-bottom: 30px; border-color: var(--black);">
                    <h2>System Status</h2>
                    <p>Voting: <b id="status-label">LOADING</b> | GPS: <b id="geo-label">LOADING</b></p>
                    <p>Hardware Lock: <b id="dna-label">LOADING</b></p>
                    <p>Live Voters: <b id="active-voters">0</b></p>
                    
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="window.toggleSet('isOpen', true)" style="background: #27ae60; flex: 1; font-size: 0.7rem;">UNLOCK VOTING</button>
                        <button onclick="window.toggleSet('isOpen', false)" style="background: var(--black); flex: 1; font-size: 0.7rem;">LOCK VOTING</button>
                    </div>
                </div>

                <div class="card" style="background:#fff0f0; border-color: var(--red);">
                    <h2>Maintenance</h2>
                    <button onclick="window.clearAllDeviceLocks()" style="background:var(--yellow); color:black; margin-bottom:10px; font-size: 0.7rem;">FORCE GLOBAL CACHE WIPE</button>
                    <button onclick="window.resetExpoForLaunch()" style="background:var(--red); margin-bottom:10px; font-size: 0.7rem;">RESET ALL VOTES TO 0</button>
                </div>
            </div>

            <div class="card">
                <h2 id="form-title">Add Artist</h2>
                <input type="text" id="a-code" placeholder="Booth Code">
                <input type="text" id="a-artist" placeholder="Student Name">
                <input type="text" id="a-year" placeholder="Year Group">
                <select id="a-cat">
                    <option value="kindergarten">Kindergarten</option>
                    <option value="primary">Primary</option>
                    <option value="secondary">Secondary</option>
                </select>
                <button onclick="window.saveArt()">Save to Cloud</button>
            </div>
        </div>

        <div class="card" style="margin-top: 40px;">
            <h2>Cloud Database</h2>
            <div id="admin-results" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        let fullLocalData = [];

        window.toggleSet = async function(key, value) {
            await db.collection('settings').doc('status').set({ [key]: value }, { merge: true });
        };

        db.collection('settings').doc('status').onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('status-label').innerText = d.isOpen ? 'OPEN' : 'LOCKED';
                document.getElementById('geo-label').innerText = d.isGeofenceEnabled ? '5KM ACTIVE' : 'OFF';
                document.getElementById('dna-label').innerText = d.isDNALockEnabled ? 'ACTIVE' : 'OFF';
            }
        });

        db.collection('artworks').onSnapshot(snap => {
            fullLocalData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderList();
        });

        function renderList() {
            const out = document.getElementById('admin-results');
            out.innerHTML = "";
            fullLocalData.forEach(d => {
                const div = document.createElement('div');
                div.className = "result-row";
                div.innerHTML = `<b>${d.id}</b> ${d.artist} (${d.voteCount || 0} votes)`;
                out.appendChild(div);
            });
        }

        window.clearAllDeviceLocks = async function() {
            if(confirm("FORCE GLOBAL WIPE? This clears every visitor's phone storage. Use before 9 AM.")) {
                await db.collection('settings').doc('status').set({ 
                    lastGlobalReset: firebase.firestore.FieldValue.serverTimestamp() 
                }, { merge: true });
                alert("Wipe Signal Sent.");
            }
        };

        window.resetExpoForLaunch = async function() {
            if(confirm("WIPE ALL VOTES TO ZERO?")) {
                const b = db.batch();
                fullLocalData.forEach(s => b.update(db.collection('artworks').doc(s.id), { voteCount: 0 }));
                const vots = await db.collection('voters').get(); vots.forEach(v => b.delete(v.ref));
                await b.commit(); alert("Clean Slate Ready!");
            }
        };

        window.saveArt = async function() {
            const code = document.getElementById('a-code').value.toUpperCase().trim();
            const artist = document.getElementById('a-artist').value.trim();
            if(!code || !artist) return alert("Required fields missing");
            await db.collection('artworks').doc(code).set({
                artist, 
                year: document.getElementById('a-year').value.toUpperCase(),
                category: document.getElementById('a-cat').value,
                voteCount: 0
            }, {merge: true});
            alert("Saved.");
        };
    </script>
</body>
</html>

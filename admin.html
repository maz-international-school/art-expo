<!-- Add this new card to the Security column in admin.html -->
<div class="card" style="margin-bottom: 30px; border-color: var(--yellow); box-shadow: 10px 10px 0px var(--yellow);">
    <h2>Hardware Shield</h2>
    <p>DNA Fingerprinting: <b id="dna-label">LOADING</b></p>
    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="toggleSet('isDNALockEnabled', true)" style="background:var(--red); font-size:0.7rem;">LOCK HARDWARE</button>
        <button onclick="toggleSet('isDNALockEnabled', false)" style="background:var(--black); font-size:0.7rem;">DISABLE</button>
    </div>
</div>

<!-- Updated Status Listener in admin.html -->
<script>
    db.collection('settings').doc('status').onSnapshot(d => {
        if(d.exists){ 
            const data = d.data();
            document.getElementById('status-label').innerText = data.isOpen ? 'OPEN' : 'LOCKED';
            document.getElementById('geo-label').innerText = data.isGeofenceEnabled ? '5KM ACTIVE' : 'OFF';
            // NEW: DNA LABEL
            const dnaLab = document.getElementById('dna-label');
            if(dnaLab) {
                dnaLab.innerText = data.isDNALockEnabled ? 'ACTIVE' : 'OFF (DEV MODE)';
                dnaLab.style.color = data.isDNALockEnabled ? 'var(--red)' : 'var(--blue)';
            }
        }
    });
</script>

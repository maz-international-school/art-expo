<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: none; padding: 50px 20px; overflow-x: hidden;">

    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="container" style="max-width: 1000px; text-align: left;">
        <header style="margin-bottom: 40px;">
            <h1 style="justify-content: flex-start;">EXPO CONTROL</h1>
            <p style="background: var(--red); color: white; display: inline-block; padding: 5px 15px;">Admin Mission Control • v6.0 Stable</p>
        </header>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
            
            <!-- COLUMN 1: SYSTEM CONTROLS -->
            <div>
                <div class="card" style="margin-bottom: 30px; border-color: var(--black);">
                    <h2>System Status</h2>
                    <p>Voting: <b id="status-label">LOADING</b> | GPS: <b id="geo-label">LOADING</b></p>
                    <p>Unique Voters: <b id="active-voters">0</b></p>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="window.toggleSet('isOpen', true)" style="background: #27ae60; flex: 1; font-size: 0.7rem;">UNLOCK</button>
                        <button onclick="window.toggleSet('isOpen', false)" style="background: var(--black); flex: 1; font-size: 0.7rem;">LOCK</button>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <button onclick="window.toggleSet('isGeofenceEnabled', true)" style="background: var(--blue); flex: 1; font-size: 0.7rem;">GPS ON</button>
                        <button onclick="window.toggleSet('isGeofenceEnabled', false)" style="background: var(--black); flex: 1; font-size: 0.7rem;">GPS OFF</button>
                    </div>
                </div>

                <div class="card" style="background:#fff0f0; border-color: var(--red); margin-bottom: 30px;">
                    <h2>DANGER ZONE</h2>
                    <button onclick="window.clearAllDeviceLocks()" style="background:var(--yellow); color:black; margin-bottom:10px; font-size: 0.7rem;">FORCE GLOBAL DEVICE WIPE</button>
                    <button onclick="window.resetExpoForLaunch()" style="background:var(--red); margin-bottom:10px; font-size: 0.7rem;">RESET ALL VOTES TO 0</button>
                    <button onclick="window.nuclearWipe()" style="background:var(--black); border-color:var(--red); font-size: 0.6rem;">DELETE ALL ARTWORKS</button>
                </div>
            </div>

            <!-- COLUMN 2: MANUAL EDITOR -->
            <div class="card" style="border-color: var(--red);">
                <h2 id="form-title">Add/Edit Artist</h2>
                <input type="text" id="a-code" placeholder="Booth Code (B101)">
                <input type="text" id="a-artist" placeholder="Student Name">
                <input type="text" id="a-title" placeholder="Artwork Title">
                <input type="text" id="a-year" placeholder="Year Group (e.g. KG1, Y7)">
                
                <select id="a-cat">
                    <option value="kindergarten">Kindergarten</option>
                    <option value="primary">Primary</option>
                    <option value="secondary">Secondary</option>
                </select>
                
                <button onclick="window.saveArt()" id="save-btn">Save to Database</button>
                <button onclick="window.resetForm()" id="cancel-btn" class="hidden" style="background:none; color:var(--blue); border:none; text-decoration:underline; margin-top:10px; cursor:pointer;">Cancel Edit</button>
            </div>

            <!-- COLUMN 3: BULK SYNC -->
            <div class="card" style="border-color: var(--yellow);">
                <h2>Bulk Sync (CSV)</h2>
                <p style="font-size: 0.7rem; margin-bottom: 10px;">Format: Code, Name, Title, Category, Year</p>
                <input type="file" id="csv-file" accept=".csv" style="padding: 10px;">
                <button onclick="window.bulkUpload()" id="upload-btn" style="background: var(--blue);">Sync Namelist</button>
                <div id="upload-status" style="margin-top:10px; font-weight: 900; color: var(--red); font-size: 0.7rem;"></div>
            </div>
        </div>

        <!-- DATABASE VIEWER -->
        <div class="card" style="margin-top: 40px; box-shadow: 15px 15px 0px var(--black); width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h2>Live Database</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div id="total-votes" style="background: var(--black); color: white; padding: 5px 15px; font-weight: 900; font-size: 0.8rem;">0 VOTES</div>
                    <button onclick="window.exportCSV()" style="width:auto; padding:10px 15px; font-size:0.7rem; background:var(--yellow); color:black; border: 2px solid black;">Export Final CSV</button>
                </div>
            </div>

            <!-- SEARCH BAR -->
            <input type="text" id="db-search" placeholder="Search by name, code, or year group..." style="margin-top: 20px; border-color: var(--blue);">

            <div id="admin-results" style="margin-top: 10px; max-height: 600px; overflow-y: auto;">
                <!-- Records list here -->
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // --- 1. SECURITY & INITIALIZATION ---
        const ADMIN_PASSKEY = "maz_admin_2026";
        const entry = prompt("ADMIN ACCESS REQUIRED:");

        if (entry !== ADMIN_PASSKEY) {
            alert("ACCESS DENIED.");
            window.location.href = "index.html";
        } else {
            document.body.style.display = "block";
        }

        let fullLocalData = [];

        // --- 2. REMOTE SETTINGS ---
        window.toggleSet = async function(key, value) {
            await db.collection('settings').doc('status').set({ [key]: value }, { merge: true });
        };

        db.collection('settings').doc('status').onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('status-label').innerText = d.isOpen ? 'OPEN' : 'LOCKED';
                document.getElementById('status-label').style.color = d.isOpen ? '#27ae60' : 'var(--red)';
                document.getElementById('geo-label').innerText = d.isGeofenceEnabled ? '5KM ACTIVE' : 'OFF';
                document.getElementById('geo-label').style.color = d.isGeofenceEnabled ? 'var(--red)' : 'var(--blue)';
            }
        });

        db.collection('voters').onSnapshot(snap => {
            document.getElementById('active-voters').innerText = snap.size;
        });

        // --- 3. SEARCH & RENDERING (CRASH-PROOF) ---
        function renderList(filter = "") {
            const out = document.getElementById('admin-results');
            if (!out) return;
            out.innerHTML = "";
            const query = filter.toLowerCase().trim();

            const filtered = fullLocalData.filter(d => {
                const name = (d.artist || "").toLowerCase();
                const code = (d.id || "").toLowerCase();
                const year = (d.year || "").toLowerCase();
                const title = (d.title || "").toLowerCase();
                return name.includes(query) || code.includes(query) || year.includes(query) || title.includes(query);
            });

            filtered.forEach(d => {
                const row = document.createElement('div');
                row.className = "result-row";
                row.style.cssText = "border: 4px solid black; margin-bottom: 10px; padding: 12px; display: flex; justify-content: space-between; align-items: center; background: white;";
                row.innerHTML = `
                    <div style="flex:1; min-width:0;">
                        <b style="color:var(--red)">${d.id}</b> ${d.artist || 'Unknown'}
                        <br><small style="opacity:0.6; font-size:0.7rem;">${(d.year || 'NO YEAR').toUpperCase()} | ${(d.category || 'primary').toUpperCase()} | "${d.title || 'No Title'}"</small>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-weight:900;">${d.voteCount || 0}</span>
                        <button onclick="window.prepareEdit('${d.id}')" style="width:auto; padding:5px 10px; font-size:0.6rem; background:var(--yellow); color:black; border:2px solid black; cursor:pointer;">EDIT</button>
                        <button onclick="window.deleteArt('${d.id}')" style="width:auto; padding:5px 10px; font-size:0.6rem; background:var(--red); color:white; border:2px solid black; cursor:pointer;">DEL</button>
                    </div>`;
                out.appendChild(row);
            });
        }

        // --- 4. REAL-TIME SNAPSHOT ---
        db.collection('artworks').onSnapshot(snap => {
            let total = 0;
            fullLocalData = snap.docs.map(doc => {
                const d = doc.data();
                total += (d.voteCount || 0);
                return { id: doc.id, ...d };
            });
            document.getElementById('total-votes').innerText = total + " VOTES";
            renderList(document.getElementById('db-search').value);
        });

        // --- 5. DATA ACTIONS ---
        window.saveArt = async function() {
            const code = document.getElementById('a-code').value.toUpperCase().trim();
            const artist = document.getElementById('a-artist').value.trim();
            const year = document.getElementById('a-year').value.toUpperCase().trim();
            if (!code || !artist || !year) return alert("Code, Name, and Year required!");

            await db.collection('artworks').doc(code).set({
                artist, year, category: document.getElementById('a-cat').value,
                title: document.getElementById('a-title').value.trim() || "Untitled",
                voteCount: firebase.firestore.FieldValue.increment(0)
            }, { merge: true });
            alert("Success!"); window.resetForm();
        };

        window.bulkUpload = async function() {
            const file = document.getElementById('csv-file').files[0];
            const status = document.getElementById('upload-status');
            if(!file) return alert("Select CSV!");
            status.innerText = "UPLOADING...";
            
            Papa.parse(file, {header:true, skipEmptyLines:true, complete: async (res) => {
                let count = 0;
                for(let item of res.data) {
                    const clean = {}; Object.keys(item).forEach(k => clean[k.trim().toLowerCase()] = item[k]);
                    if(clean.code) {
                        await db.collection('artworks').doc(clean.code.trim().toUpperCase()).set({
                            artist: (clean.name || "Unknown").trim(),
                            title: (clean.title || "").trim(),
                            category: (clean.category || "primary").toLowerCase().trim(),
                            year: (clean.year || "Y1").toUpperCase().trim(),
                            voteCount: parseInt(clean.votes) || 0
                        }, { merge: true });
                        count++;
                        status.innerText = `Sync: ${count}`;
                    }
                }
                alert("Namelist Synced!");
            }});
        };

        // --- 6. MAINTENANCE ---
        window.clearAllDeviceLocks = async function() {
            if(confirm("Force wipe all phone browser caches?")) {
                await db.collection('settings').doc('status').set({ lastGlobalReset: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                alert("Wipe Signal Sent.");
            }
        };

        window.resetExpoForLaunch = async function() {
            if(confirm("Reset all vote counts to zero?")) {
                const b = db.batch();
                fullLocalData.forEach(s => b.update(db.collection('artworks').doc(s.id), { voteCount: 0 }));
                const vots = await db.collection('voters').get(); vots.forEach(v => b.delete(v.ref));
                await b.commit(); alert("Votes Cleared.");
            }
        };

        window.nuclearWipe = async function() {
            if(prompt("Type DELETE to wipe every student") === "DELETE") {
                const snap = await db.collection('artworks').get();
                const b = db.batch(); snap.docs.forEach(doc => b.delete(doc.ref)); await b.commit();
                location.reload();
            }
        };

        // --- 7. UTILS ---
        window.prepareEdit = function(id) {
            const s = fullLocalData.find(x => x.id === id);
            if (!s) return;
            document.getElementById('a-code').value = s.id;
            document.getElementById('a-code').disabled = true;
            document.getElementById('a-artist').value = s.artist || "";
            document.getElementById('a-title').value = s.title || "";
            document.getElementById('a-year').value = s.year || "";
            document.getElementById('a-cat').value = s.category || "primary";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.deleteArt = async function(id) { if(confirm("Delete " + id + "?")) await db.collection('artworks').doc(id).delete(); };
        window.resetForm = function() { document.getElementById('a-code').value=""; document.getElementById('a-code').disabled=false; document.getElementById('cancel-btn').classList.add('hidden'); };
        window.exportCSV = function() {
            let csv = "Code,Name,Title,Category,Year,Votes\n";
            fullLocalData.forEach(d => { csv += `${d.id},"${d.artist}","${d.title}",${d.category},${d.year},${d.voteCount || 0}\n`; });
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'results.csv'; a.click();
        };

        document.getElementById('db-search').oninput = (e) => renderList(e.target.value);
    </script>
</body>
</html>

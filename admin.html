<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 50px 20px; overflow-x: hidden;">

    <!-- 3x3 Grid Logo Anchor -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="container" style="max-width: 1000px; text-align: left;">
        <header style="margin-bottom: 40px;">
            <h1 style="justify-content: flex-start;">EXPO CONTROL</h1>
            <p style="background: var(--red); color: white;">Mission Control • MAZ Art Expo 2026</p>
        </header>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;" class="admin-grid">
            
            <!-- COLUMN 1: SYSTEM & BULK -->
            <div>
                <!-- KILL SWITCH -->
                <div class="card" style="margin-bottom: 30px; border-color: var(--black); box-shadow: 10px 10px 0px var(--black);">
                    <h2>System Status</h2>
                    <p>Voting is currently: <b id="status-label" style="font-size: 1.2rem;">LOADING...</b></p>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button onclick="toggleSystem(true)" style="background: #27ae60; flex: 1;">UNLOCK</button>
                        <button onclick="toggleSystem(false)" style="background: var(--black); flex: 1;">LOCK</button>
                    </div>
                </div>

                <!-- MEGA UPLOAD -->
                <div class="card" style="box-shadow: 10px 10px 0px var(--yellow);">
                    <h2>Mega Upload (CSV)</h2>
                    <input type="file" id="csv-file" accept=".csv" style="padding: 10px;">
                    <button onclick="bulkUpload()" id="upload-btn" style="background: var(--blue);">Sync Namelist</button>
                    <div id="upload-status" style="margin-top:10px; font-weight: 900; color: var(--red); font-size: 0.7rem;"></div>
                </div>
            </div>

            <!-- COLUMN 2: MANUAL EDITOR -->
            <div class="card" style="box-shadow: 10px 10px 0px var(--red);">
                <h2 id="form-title">Add/Edit Artist</h2>
                <input type="text" id="a-code" placeholder="Code (e.g. SD0001)">
                <input type="text" id="a-title" placeholder="Art Title">
                <input type="text" id="a-artist" placeholder="Student Name">
                <select id="a-cat">
                    <option value="kindergarten">Kindergarten</option>
                    <option value="primary">Primary</option>
                    <option value="secondary">Secondary</option>
                </select>
                <button onclick="addArt()" id="save-btn">Save to Database</button>
                <button onclick="resetForm()" id="cancel-btn" class="hidden" style="background:none; color:var(--blue); border:none; text-decoration:underline; margin-top:10px; cursor:pointer;">Cancel Edit</button>
            </div>
        </div>

        <!-- LIVE DATABASE & EXPORT -->
        <div class="card" style="margin-top: 40px; box-shadow: 15px 15px 0px var(--black); width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h2>Live Database</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div id="total-votes" style="background: var(--black); color: white; padding: 5px 15px; font-weight: 900;">VOTES: 0</div>
                    <button onclick="exportResults()" style="background: var(--yellow); color: black; font-size: 0.7rem; padding: 10px 15px; width: auto;">Export Final CSV</button>
                </div>
            </div>

            <input type="text" id="db-search" placeholder="Quick find by name or code..." style="margin-top: 20px; border-color: var(--blue);">

            <div id="admin-results" style="margin-top: 10px; max-height: 500px; overflow-y: auto;">
                <!-- Records injected here -->
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>

    <script>
        let fullLocalData = [];

        // 1. SYSTEM STATUS (KILL-SWITCH)
        async function toggleSystem(isOpen) {
            await db.collection('settings').doc('status').set({ isOpen: isOpen });
            console.log("System toggled to: " + isOpen);
        }

        db.collection('settings').doc('status').onSnapshot(doc => {
            const label = document.getElementById('status-label');
            if (doc.exists) {
                const open = doc.data().isOpen;
                label.innerText = open ? "OPEN" : "LOCKED";
                label.style.color = open ? "#27ae60" : "var(--red)";
            }
        });

        // 2. EXPORT RESULTS
        function exportResults() {
            if(fullLocalData.length === 0) return alert("No data to export!");
            let csv = "Code,Name,Title,Category,Votes\n";
            fullLocalData.forEach(d => {
                csv += `${d.id},"${d.artist}","${d.title || ''}",${d.category},${d.voteCount || 0}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'art_expo_final_results.csv');
            a.click();
        }

        // 3. ADD / UPDATE
        async function addArt() {
            const code = document.getElementById('a-code').value.toUpperCase().trim();
            const title = document.getElementById('a-title').value.trim();
            const artist = document.getElementById('a-artist').value.trim();
            const cat = document.getElementById('a-cat').value;
            if(!code || !artist) return alert("Missing info!");
            await db.collection('artworks').doc(code).set({ title, artist, category: cat }, { merge: true });
            resetForm();
        }

        function resetForm() {
            document.getElementById('a-code').value = "";
            document.getElementById('a-code').disabled = false;
            document.getElementById('a-title').value = "";
            document.getElementById('a-artist').value = "";
            document.getElementById('form-title').innerText = "Add/Edit Artist";
            document.getElementById('save-btn').innerText = "Save to Database";
            document.getElementById('cancel-btn').classList.add('hidden');
        }

        function prepareEdit(code, title, artist, cat) {
            document.getElementById('a-code').value = code;
            document.getElementById('a-code').disabled = true;
            document.getElementById('a-title').value = title;
            document.getElementById('a-artist').value = artist;
            document.getElementById('a-cat').value = cat;
            document.getElementById('form-title').innerText = "Editing: " + code;
            document.getElementById('save-btn').innerText = "Update Record";
            document.getElementById('cancel-btn').classList.remove('hidden');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        async function deleteArt(code) {
            if(confirm("Permanently delete " + code + "?")) {
                await db.collection('artworks').doc(code).delete();
            }
        }

        // 4. BULK UPLOAD
        async function bulkUpload() {
            const file = document.getElementById('csv-file').files[0];
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('upload-btn');
            if(!file) return alert("Select CSV!");
            btn.disabled = true;
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (res) => {
                    let count = 0;
                    for(let item of res.data) {
                        if(item.Code) {
                            await db.collection('artworks').doc(item.Code.trim().toUpperCase()).set({
                                title: item.Title || "", artist: item.Name || "", category: (item.Category || "primary").toLowerCase()
                            }, { merge: true });
                            count++;
                            status.innerText = `SYNCING... ${count} / ${res.data.length}`;
                        }
                    }
                    status.innerText = `✅ SYNCED ${count} RECORDS.`;
                    btn.disabled = false;
                }
            });
        }

        // 5. DATABASE VIEWER
        function renderList(filter = "") {
            const out = document.getElementById('admin-results');
            out.innerHTML = "";
            fullLocalData.filter(d => d.id.toLowerCase().includes(filter) || d.artist.toLowerCase().includes(filter)).forEach(d => {
                const row = document.createElement('div');
                row.className = "result-row";
                row.innerHTML = `
                    <div style="flex:1;"><b style="color:var(--red)">${d.id}</b> ${d.artist}<br><small>${d.category.toUpperCase()} | "${d.title || ''}"</small></div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="background:var(--blue); color:white; padding:2px 8px;">${d.voteCount || 0}</span>
                        <button onclick="prepareEdit('${d.id}','${d.title}','${d.artist}','${d.category}')" style="background:var(--yellow); color:black; font-size:0.6rem; padding:5px; width:auto; border:2px solid black;">EDIT</button>
                        <button onclick="deleteArt('${d.id}')" style="background:var(--red); color:white; font-size:0.6rem; padding:5px; width:auto; border:2px solid black;">DEL</button>
                    </div>`;
                out.appendChild(row);
            });
        }

        document.getElementById('db-search').oninput = (e) => renderList(e.target.value.toLowerCase());

        db.collection('artworks').onSnapshot(snap => {
            let total = 0;
            fullLocalData = snap.docs.map(doc => {
                const d = doc.data();
                total += (d.voteCount || 0);
                return { id: doc.id, ...d };
            });
            document.getElementById('total-votes').innerText = "TOTAL VOTES: " + total;
            renderList(document.getElementById('db-search').value.toLowerCase());
        });
    </script>

    <style>
        @media (max-width: 600px) { .admin-grid { grid-template-columns: 1fr !important; } }
        .result-row small { opacity: 0.6; text-transform: none; font-weight: 400; }
    </style>
</body>
</html>

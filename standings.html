<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MAZ ART EXPO | BROADCAST</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow:hidden; cursor:none;">
    <img src="image1.png" class="school-logo">
    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        <div style="background: var(--black); color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem;">MAZ ART EXPO 2026</div>
            <div style="display:flex; align-items:center; gap:20px;">
                <div style="font-size:0.7rem; color:var(--white); opacity:0.3; font-family:Montserrat;">SPACE TO JUMP</div>
                <div style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: black; padding: 5px 25px; border: 4px solid white;">TOTAL: <span id="master-total-ticker">0</span></div>
            </div>
        </div>
        <div id="broadcast-stage" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px;"></div>
        <div style="background: var(--blue); color: white; height: 70px; overflow: hidden; display: flex; align-items: center; border-top: 8px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px;">
                START VOTING • MAY THE BEST ARTWORK WIN • WAIT FOR YOUR YEAR TO POP UP! • CAST YOUR VOTE VIA THE OFFICIAL QR CODE • ON-SITE VERIFICATION ACTIVE • 
            </div>
        </div>
    </div>
    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];
        let currentPairIndex = 0, allData = [], autoCycle;
        db.collection('artworks').onSnapshot(snap => {
            allData = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            let total = 0; allData.forEach(d => total += (d.voteCount || 0));
            document.getElementById('master-total-ticker').innerText = total;
            renderStage();
        });
        function nextSlide() { currentPairIndex += 2; if (currentPairIndex >= groups.length) currentPairIndex = 0; renderStage(); resetTimer(); }
        function resetTimer() { clearInterval(autoCycle); autoCycle = setInterval(nextSlide, 10000); }
        window.addEventListener('keydown', (e) => { if (e.code === "Space") { e.preventDefault(); nextSlide(); } });
        resetTimer();
        function renderStage() {
            const stage = document.getElementById('broadcast-stage'); stage.innerHTML = "";
            const pair = [groups[currentPairIndex], groups[currentPairIndex + 1]].filter(Boolean);
            pair.forEach(g => {
                const students = allData.filter(a => a.year === g.id && (a.voteCount || 0) > 0).sort((a,b) => b.voteCount - a.voteCount);
                const col = document.createElement('div'); col.className = "stage-column-new fade-in";
                let inner = `<div class="stage-header-new" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${g.l}</div>`;
                if (students.length === 0) {
                    inner += `<div style="margin:auto; opacity:0.1; text-align:center; transform:rotate(-5deg);"><h2 style="font-family:'Archivo Black'; font-size:4rem;">AWAITING<br>VOTES</h2></div>`;
                } else {
                    const topScore = students[0].voteCount; const leaders = students.filter(s => s.voteCount === topScore);
                    inner += `<div class="hero-box" style="border-left: 15px solid ${getCol(g.c)}">
                        <div class="hero-label">${leaders.length > 1 ? 'JOINT LEADERS' : 'CURRENT LEADER'}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; gap:20px;">
                            <div style="flex:1; min-width:0;">
                                <div style="font-family:'Archivo Black'; font-size:3.5rem; line-height:1; text-transform:uppercase; word-wrap:break-word;">${leaders.length > 2 ? 'MULTIPLE' : leaders.map(l => l.artist).join(" & ")}</div>
                                <div style="font-weight:700; font-size:1.2rem; opacity:0.4; text-transform:uppercase; margin-top:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${leaders.length===1?(leaders[0].title||'Untitled'):leaders.length+' Artists Tied'}</div>
                            </div>
                            <div style="display:flex; align-items:baseline; gap:10px; flex-shrink:0;"><span style="font-family:'Archivo Black'; font-size:7rem; line-height:0.8;">${topScore}</span><span style="font-family:'Archivo Black'; font-size:1rem;">VOTES</span></div>
                        </div>
                    </div>`;
                    if (students.length > leaders.length) {
                        inner += `<div class="runners-list">`;
                        students.slice(leaders.length, leaders.length + 2).forEach((s, i) => {
                            inner += `<div class="runner-item"><span>#${leaders.length+i+1} ${s.artist}</span><span style="color:${getCol(g.c)}">${s.voteCount}</span></div>`;
                        });
                        inner += `</div>`;
                    }
                }
                col.innerHTML = inner; stage.appendChild(col);
            });
        }
        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>
</body>
</html>

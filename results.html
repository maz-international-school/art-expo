<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rankings | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 0; overflow-y: auto; cursor: default;">

    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red); flex-wrap: wrap; gap: 10px;">
            <div style="font-family: 'Archivo Black'; font-size: clamp(1.5rem, 5vw, 3.5rem); letter-spacing: -1px;">ART EXPO 2026</div>
            <div id="total-votes-ticker" style="font-family: 'Archivo Black'; font-size: 1.5rem; background: var(--yellow); color: var(--black); padding: 5px 20px; border: 4px solid white;">TOTAL: 0</div>
        </div>

        <!-- 13-PRIZE RESPONSIVE GRID -->
        <div id="champion-wall" style="flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 20px; background: transparent;">
            <!-- Categories injected here -->
        </div>

        <!-- FOOTER -->
        <div style="background: var(--blue); color: white; height: 50px; overflow: hidden; display: flex; align-items: center; border-top: 6px solid var(--black); margin-top: auto;">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;">
                LIVE EXHIBITION STANDINGS • JALAN KRISTAL SHAH ALAM • CAST YOUR VOTE VIA THE OFFICIAL EXPO LINK
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let currentTotal = 0;

            groups.forEach((g) => {
                const s = data.filter(a => a.year === g.id).sort((a,b) => b.voteCount - a.voteCount);
                const w = s.length > 0 && s[0].voteCount > 0 ? s[0] : null;
                s.forEach(x => currentTotal += (x.voteCount || 0));

                const card = document.createElement('div');
                card.className = "gallery-card";
                card.style.borderLeft = `8px solid ${getCol(g.c)}`;
                
                card.innerHTML = `
                    <div class="card-label" style="color:${getCol(g.c)}">${g.l}</div>
                    <div class="card-content">
                        <div class="winner-name">${w ? w.artist : '<span style="opacity:0.15">---</span>'}</div>
                        <div class="winner-title">${w ? (w.title || 'Untitled') : 'Awaiting Selection'}</div>
                    </div>
                    <div class="card-footer">
                        <div class="vote-badge">${w ? w.voteCount : 0}</div>
                        <div class="booth-tag" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${w ? w.id : g.id}</div>
                    </div>
                `;
                wall.appendChild(card);
            });
            document.getElementById('total-votes-ticker').innerText = "TOTAL: " + currentTotal;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>
</body>
</html>

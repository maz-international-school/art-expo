<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO 2026 | LIVE RANKINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow:hidden; cursor:none;">

    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- TOP BROADCAST BAR -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--black); color: white; padding: 20px 50px; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">ART EXPO 2026</div>
            <div id="total-votes-ticker" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 5px 25px; border: 4px solid white;">TOTAL: 0</div>
        </div>

        <!-- 13-PRIZE GRID -->
        <div id="champion-wall" style="flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; padding: 25px; background: transparent;">
            <!-- Year Groups injected here -->
        </div>

        <!-- REFINED FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 50px; overflow: hidden; display: flex; align-items: center; border-top: 6px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;">
                LIVE EXHIBITION STANDINGS • JALAN KRISTAL SHAH ALAM • CAST YOUR VOTE VIA THE OFFICIAL EXPO LINK • SUPPORTING YOUNG ARTISTS
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let currentTotal = 0;

            groups.forEach((g) => {
                const s = data.filter(a => a.year === g.id).sort((a,b) => b.voteCount - a.voteCount);
                const w = s.length > 0 && s[0].voteCount > 0 ? s[0] : null;
                s.forEach(x => currentTotal += (x.voteCount || 0));

                const card = document.createElement('div');
                card.className = "gallery-card";
                card.style.borderLeft = `8px solid ${getCol(g.c)}`;
                
                card.innerHTML = `
                    <div class="card-label" style="color:${getCol(g.c)}">${g.l}</div>
                    <div class="card-content">
                        <div class="winner-name">${w ? w.artist : '<span style="opacity:0.15">---</span>'}</div>
                        <div class="winner-title">${w ? w.title : 'Awaiting Selection'}</div>
                    </div>
                    <div class="card-footer">
                        <div class="vote-badge">${w ? w.voteCount : 0}</div>
                        <div class="booth-tag">${w ? w.id : ''}</div>
                    </div>
                `;
                wall.appendChild(card);
            });
            document.getElementById('ticker-total').innerText = currentTotal;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .gallery-card { background: white; border: 4px solid var(--black); box-shadow: 8px 8px 0px var(--black); display: flex; flex-direction: column; padding: 12px; }
        .card-label { font-family: 'Archivo Black'; font-size: 0.8rem; margin-bottom: 5px; }
        .winner-name { font-weight: 900; font-size: 1.1rem; line-height: 1; text-transform: uppercase; }
        .winner-title { font-size: 0.6rem; opacity: 0.5; font-weight: 700; margin-top: 3px; }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .vote-badge { font-family: 'Archivo Black'; font-size: 1.8rem; }
        .booth-tag { font-size: 0.6rem; background: var(--black); color: white; padding: 2px 5px; font-weight: 900; }
        
        .scrolling-text { white-space: nowrap; animation: scroll-left 40s linear infinite; padding-left: 100%; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</body>
</html>

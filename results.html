<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE RANKINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 0; overflow: hidden; cursor: none;">

    <!-- THE 3x3 COLOR LOGO (Bottom Right) -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- TOP BROADCAST BAR -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--black); color: white; padding: 20px 40px; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">ART EXPO 2026</div>
            <div id="total-votes-ticker" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 5px 25px; border: 4px solid white;">TOTAL VOTES: 0</div>
        </div>

        <!-- THE TRI-GRID LAYOUT -->
        <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; background: transparent;">
            
            <!-- KINDERGARTEN -->
            <div style="border-right: 6px solid var(--black); display: flex; flex-direction: column;">
                <div style="background: var(--red); color: white; font-family: 'Archivo Black'; font-size: 2.5rem; padding: 25px; text-align: center; border-bottom: 6px solid var(--black);">KINDERGARTEN</div>
                <div id="chart-kindergarten" class="led-list"></div>
            </div>

            <!-- PRIMARY -->
            <div style="border-right: 6px solid var(--black); display: flex; flex-direction: column;">
                <div style="background: var(--blue); color: white; font-family: 'Archivo Black'; font-size: 2.5rem; padding: 25px; text-align: center; border-bottom: 6px solid var(--black);">PRIMARY</div>
                <div id="chart-primary" class="led-list"></div>
            </div>

            <!-- SECONDARY -->
            <div style="display: flex; flex-direction: column;">
                <div style="background: var(--yellow); color: var(--black); font-family: 'Archivo Black'; font-size: 2.5rem; padding: 25px; text-align: center; border-bottom: 6px solid var(--black);">SECONDARY</div>
                <div id="chart-secondary" class="led-list"></div>
            </div>

        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            let globalTotal = 0;

            ['kindergarten', 'primary', 'secondary'].forEach(cat => {
                const out = document.getElementById(`chart-${cat}`);
                out.innerHTML = "";
                
                // CRITICAL CHANGE: Only show people with AT LEAST 1 vote
                const list = data.filter(a => a.category === cat && (a.voteCount || 0) > 0)
                                 .sort((a,b) => b.voteCount - a.voteCount)
                                 .slice(0, 6);

                if(list.length > 0) {
                    const max = Math.max(...list.map(a => a.voteCount), 1);
                    list.forEach((art, i) => {
                        globalTotal += art.voteCount;
                        const pct = (art.voteCount / max) * 100;
                        
                        const row = document.createElement('div');
                        row.className = "led-row";
                        row.innerHTML = `
                            <div class="artist-label">
                                <span class="rank" style="color:${getCatColor(cat)}">#${i+1}</span> ${art.artist}
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill" style="width: ${pct}%; background: ${getCatColor(cat)}"></div>
                                <div class="vote-number">${art.voteCount}</div>
                            </div>
                        `;
                        out.appendChild(row);
                    });
                } else {
                    // Placeholder when there are no votes
                    out.innerHTML = `
                        <div style="margin: auto; text-align: center; opacity: 0.2; transform: rotate(-5deg);">
                            <h3 style="font-family: 'Archivo Black'; font-size: 2rem;">WAITING FOR<br>VOTES...</h3>
                        </div>
                    `;
                }
            });

            // Sum up total votes even if they aren't in the "Top 6"
            let realTotal = 0;
            data.forEach(d => realTotal += (d.voteCount || 0));
            document.getElementById('total-votes-ticker').innerText = "TOTAL VOTES: " + realTotal;
        });

        function getCatColor(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .led-list { padding: 40px; flex: 1; display: flex; flex-direction: column; gap: 35px; background: transparent; justify-content: flex-start; }
        
        .led-row { display: flex; flex-direction: column; gap: 10px; animation: slideIn 0.5s ease-out forwards; }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .artist-label { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 1.6rem; 
            text-transform: uppercase;
            color: var(--black);
            letter-spacing: -1px;
        }

        .bar-container { 
            height: 50px; 
            border: 6px solid var(--black); 
            background: white; 
            position: relative; 
            display: flex; 
            align-items: center;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.05);
        }
        
        .bar-fill { 
            height: 100%; 
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); 
            border-right: 6px solid var(--black);
        }
        
        .vote-number { 
            position: absolute; 
            right: 15px; 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 2rem; 
            color: var(--black);
        }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Rankings | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 40px 20px;">

    <div class="container" style="max-width: 900px;">
        <header style="margin-bottom: 50px;">
            <h1 style="justify-content: center; font-size: 4rem;">RANKINGS</h1>
            <p style="background: var(--blue); color: white;">LIVE EXPO STANDINGS</p>
        </header>

        <!-- CATEGORY: KINDERGARTEN -->
        <section class="card" style="margin-bottom: 50px; border-color: var(--black);">
            <h2 style="background: var(--red); color: white; padding: 5px 15px;">KINDERGARTEN TOP 5</h2>
            <div id="chart-kindergarten" class="chart-container"></div>
        </section>

        <!-- CATEGORY: PRIMARY -->
        <section class="card" style="margin-bottom: 50px; border-color: var(--black);">
            <h2 style="background: var(--blue); color: white; padding: 5px 15px;">PRIMARY TOP 5</h2>
            <div id="chart-primary" class="chart-container"></div>
        </section>

        <!-- CATEGORY: SECONDARY -->
        <section class="card" style="margin-bottom: 50px; border-color: var(--black);">
            <h2 style="background: var(--yellow); color: var(--black); padding: 5px 15px;">SECONDARY TOP 5</h2>
            <div id="chart-secondary" class="chart-container"></div>
        </section>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        // LIVE LISTENER
        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            renderCategory('kindergarten', data);
            renderCategory('primary', data);
            renderCategory('secondary', data);
        });

        function renderCategory(catId, allData) {
            const container = document.getElementById(`chart-${catId}`);
            container.innerHTML = "";

            // Filter and Sort
            const filtered = allData
                .filter(a => a.category === catId)
                .sort((a, b) => b.voteCount - a.voteCount)
                .slice(0, 5); // Only show top 5

            if (filtered.length === 0) {
                container.innerHTML = "<p>No votes yet...</p>";
                return;
            }

            // Find max votes to scale bars
            const maxVotes = Math.max(...filtered.map(a => a.voteCount), 1);

            filtered.forEach((art, index) => {
                const percentage = (art.voteCount / maxVotes) * 100;
                
                const row = document.createElement('div');
                row.className = "chart-row";
                row.innerHTML = `
                    <div class="chart-label">
                        <strong>#${index + 1}</strong> ${art.artist}
                        <span style="display:block; font-size:0.7rem; opacity:0.6;">"${art.title}"</span>
                    </div>
                    <div class="bar-wrapper">
                        <div class="bar" style="width: ${percentage}%; background: ${getBarColor(index)};">
                            <span class="vote-num">${art.voteCount}</span>
                        </div>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function getBarColor(index) {
            const colors = ['#e63946', '#1d3557', '#ffb703', '#1a1a1a', '#555'];
            return colors[index] || '#999';
        }
    </script>

    <style>
        .chart-container {
            margin-top: 20px;
        }
        .chart-row {
            margin-bottom: 25px;
            display: grid;
            grid-template-columns: 150px 1fr;
            align-items: center;
            gap: 20px;
        }
        .chart-label {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: right;
            text-transform: uppercase;
        }
        .bar-wrapper {
            background: #f0f0f0;
            border: 3px solid var(--black);
            height: 40px;
            position: relative;
        }
        .bar {
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-right: 4px solid black;
        }
        .vote-num {
            color: white;
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }
        /* Color override for yellow bar text */
        .bar[style*="background: rgb(255, 183, 3)"] .vote-num {
            color: black;
            text-shadow: none;
        }

        @media (max-width: 600px) {
            .chart-row { grid-template-columns: 1fr; gap: 5px; }
            .chart-label { text-align: left; }
        }
    </style>
</body>
</html>

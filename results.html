<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART EXPO 2026 | LIVE VOTINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="gallery-theme">

    <!-- THE 3x3 LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo" style="opacity: 0.8;">

    <div class="results-wrapper">
        <!-- GLASS HEADER -->
        <header class="glass-header">
            <div class="header-main">
                <h1>MAZ ART EXPO 2026</h1>
                <p id="ticker-box">LIVE ACTIVITY TALLIED: <span id="master-total">0</span> VOTES</p>
            </div>
        </header>

        <!-- SCROLLABLE STANDINGS FEED -->
        <main id="standings-feed">
            <!-- Year Groups injected here -->
        </main>

        <footer style="margin-top: 50px; text-align: center; padding-bottom: 40px;">
            <p style="font-family: 'Archivo Black'; font-size: 0.7rem; color: white; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px;">
                Secure Real-Time Data Stream • On-Site Verification Active
            </p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;
            let activeCount = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                    .sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                students.forEach(s => globalTotal += (s.voteCount || 0));

                if (students.length === 0) return;
                activeCount++;

                const topScore = students[0].voteCount;
                const leaders = students.filter(s => s.voteCount === topScore);

                const section = document.createElement('section');
                section.className = "year-block-glass";

                const top = students[0];
                const leaderHTML = `
                    <div class="leader-row">
                        <div class="leader-info">
                            <span class="label" style="color:var(--yellow)">
                                ${leaders.length > 1 ? "JOINT LEADERS" : "CURRENT LEADER"}
                                ${leaders.length > 1 ? '<span class="tie-badge">TIE</span>' : ""}
                            </span>
                            <div class="leader-name">${leaders.length > 1 ? leaders.map(l => l.artist).join(" & ") : top.artist}</div>
                            <div class="leader-title">${leaders.length === 1 ? (top.title || "Untitled") : leaders.length + " students tied for 1st"}</div>
                        </div>
                        <div class="leader-score">${topScore}</div>
                    </div>
                `;

                const runners = students.filter(s => s.voteCount < topScore);
                let listHTML = "";
                if (runners.length > 0) {
                    listHTML = `<div class="rank-list-glass">`;
                    runners.slice(0, 5).forEach((s, i) => {
                        listHTML += `
                            <div class="rank-item-glass">
                                <span>#${leaders.length + i + 1} ${s.artist}</span>
                                <b>${s.voteCount}</b>
                            </div>
                        `;
                    });
                    listHTML += `</div>`;
                }

                section.innerHTML = `
                    <div class="year-tag-glass" style="border-left: 8px solid ${getCol(g.c)}">${g.l}</div>
                    <div class="content-box-glass">
                        ${leaderHTML}
                        ${listHTML}
                    </div>
                `;
                feed.appendChild(section);
            });

            if (activeCount === 0) {
                feed.innerHTML = `<div class="no-votes-glass">AWAITING FIRST SELECTION</div>`;
            }

            document.getElementById('master-total').innerText = globalTotal;
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

    <style>
        /* GALLERY BACKGROUND IMAGE */
        .gallery-theme {
            background: #000 url('bg-gallery.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            color: white;
        }

        /* DARK OVERLAY FOR READABILITY */
        .gallery-theme::before {
            content: '';
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the image slightly */
            z-index: 1;
        }

        .results-wrapper { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 60px 20px; }

        /* HEADER */
        .glass-header { margin-bottom: 60px; text-align: center; }
        h1 { font-family: 'Archivo Black'; font-size: 3.5rem; color: white; letter-spacing: -2px; margin: 0; }
        #ticker-box { font-family: 'Archivo Black'; font-size: 1.2rem; color: var(--yellow); margin-top: 10px; }

        /* GLASS CARD STYLING */
        #standings-feed { display: flex; flex-direction: column; gap: 40px; }
        
        .year-block-glass { animation: slideUp 0.6s ease-out backwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .year-tag-glass {
            font-family: 'Archivo Black';
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 10px 25px;
            display: inline-block;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .content-box-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0 20px 20px 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        .leader-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .label { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; }
        .leader-name { font-family: 'Archivo Black'; font-size: 2.2rem; text-transform: uppercase; margin: 10px 0; line-height: 1; }
        .leader-title { font-weight: 700; opacity: 0.6; text-transform: uppercase; font-size: 0.9rem; }
        .leader-score { font-family: 'Archivo Black'; font-size: 5rem; line-height: 1; }

        .rank-list-glass { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .rank-item-glass { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 700; text-transform: uppercase; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .tie-badge { background: var(--red); color: white; padding: 2px 6px; margin-left: 10px; border-radius: 4px; }
        .no-votes-glass { padding: 100px 0; text-align: center; opacity: 0.3; font-family: 'Archivo Black'; font-size: 2.5rem; }

        @media (max-width: 600px) {
            .rank-list-glass { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
            .leader-name { font-size: 1.6rem; }
            .leader-score { font-size: 3rem; }
        }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO 2026 | LIVE VOTING</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow-y: auto; cursor: none;">

    <!-- THE 3x3 COLOR LOGO (Moved Higher to block Gemini) -->
    <img src="image1.png" class="school-logo" alt="Logo" style="bottom: 50px !important;">

    <!-- THE GRID BACKDROP -->
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(var(--black) 1px, transparent 1px), linear-gradient(90deg, var(--black) 1px, transparent 1px); background-size: 50px 50px; z-index: 1;"></div>

    <div style="min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">MAZ ART EXPO 2026</div>
            <div id="ticker-total-box" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 5px 25px; border: 4px solid white;">
                TOTAL VOTES: <span id="master-total-ticker">0</span>
            </div>
        </div>

        <!-- THE 13-WINNER WALL -->
        <div id="champion-wall" style="flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; background: transparent;">
            <!-- Categories injected here -->
        </div>

        <!-- FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 60px; overflow: hidden; display: flex; align-items: center; border-top: 8px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;">
                START VOTING • MAY THE BEST ARTWORK WIN • LIVE STANDINGS UPDATED BY MAZ CLOUD DATABASE • ON-SITE VERIFICATION ACTIVE • 
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let globalTotal = 0;

            groups.forEach((g) => {
                const yearStudents = data.filter(a => a.year === g.id);
                const sorted = yearStudents.sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                const topScore = sorted.length > 0 ? (sorted[0].voteCount || 0) : 0;
                
                yearStudents.forEach(s => globalTotal += (s.voteCount || 0));

                const leaders = sorted.filter(s => s.voteCount === topScore && topScore > 0);

                const card = document.createElement('div');
                card.className = "gallery-card";
                card.style.borderLeft = `10px solid ${getCol(g.c)}`;
                
                let nameDisplay = "";
                let titleDisplay = "";
                let headerStatus = "";

                if (topScore === 0) {
                    nameDisplay = '<span style="opacity:0.1">---</span>';
                    titleDisplay = "Awaiting Selection";
                } else if (leaders.length === 1) {
                    nameDisplay = leaders[0].artist;
                    titleDisplay = leaders[0].title || "Untitled";
                } else {
                    nameDisplay = "JOINT LEADERS";
                    titleDisplay = `${leaders.length} Students Drawing`;
                    headerStatus = `<span style="background:var(--red); color:white; padding:2px 6px; font-size:0.6rem; margin-left:10px;">TIE</span>`;
                }

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div class="card-label" style="color:${getCol(g.c)}">${g.l}</div>
                        ${headerStatus}
                    </div>
                    <div class="card-content">
                        <div class="winner-name" style="font-size: ${leaders.length > 1 ? '1rem' : '1.2rem'}">${nameDisplay}</div>
                        <div class="winner-title">${titleDisplay}</div>
                    </div>
                    <div class="card-footer">
                        <div class="vote-badge">${topScore}</div>
                        <div class="booth-tag" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${leaders.length === 1 ? leaders[0].id : g.id}</div>
                    </div>
                `;
                wall.appendChild(card);
            });
            document.getElementById('master-total-ticker').innerText = globalTotal;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .gallery-card { 
            background: white; border: 4px solid var(--black); box-shadow: 8px 8px 0px var(--black); 
            display: flex; flex-direction: column; padding: 12px; min-height: 180px; box-sizing: border-box; 
            animation: popIn 0.5s ease-out backwards; position: relative; z-index: 5;
        }
        .card-label { font-family: 'Archivo Black'; font-size: 0.8rem; }
        .winner-name { font-weight: 900; line-height: 1; text-transform: uppercase; margin-top: 5px; color: var(--black); }
        .winner-title { font-size: 0.6rem; opacity: 0.5; font-weight: 700; margin-top: 3px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        .vote-badge { font-family: 'Archivo Black'; font-size: 2rem; line-height: 1; }
        .booth-tag { font-size: 0.5rem; border: 2px solid black; padding: 2px 5px; font-weight: 900; }
        
        .scrolling-text { white-space: nowrap; animation: scroll-left 40s linear infinite; padding-left: 100%; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</body>
</html>

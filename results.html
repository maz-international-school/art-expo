<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | STANDINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="watercolor-bauhaus">

    <!-- THE 3x3 LOGO ANCHOR (Higher to block AI Watermarks) -->
    <img src="image1.png" class="school-logo" alt="MAZ Logo" style="bottom: 60px !important; right: 20px !important; z-index: 1000; opacity: 1 !important;">
    
    <!-- BLUEPRINT GRID OVERLAY -->
    <div class="blueprint-overlay"></div>

    <div class="results-wrapper">
        <!-- HEADER -->
        <header class="results-header">
            <div class="header-main">
                <div class="red-bar-accent"></div>
                <h1>MAZ ART EXPO 2026</h1>
                <div class="vote-stamp">
                    <small>TOTAL VOTES</small>
                    <span id="master-total-ticker">0</span>
                </div>
            </div>
            <p class="nav-hint">PRESS SPACEBAR TO SCROLL THROUGH THE GALLERY</p>
        </header>

        <!-- SCROLLABLE STANDINGS FEED -->
        <main id="standings-feed">
            <!-- Year Groups injected via JS -->
        </main>

        <footer class="exhibition-footer">
            <p>© 2026 MAZ INTERNATIONAL SCHOOL • LIVE DATA STREAM • SECURE ON-SITE VOTING</p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;
            let activeYears = 0;

            groups.forEach((g) => {
                const yearData = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                     .sort((a,b) => b.voteCount - a.voteCount);
                
                yearData.forEach(s => globalTotal += (s.voteCount || 0));

                if (yearData.length === 0) return;
                activeYears++;

                const topScore = yearData[0].voteCount;
                const leaders = yearData.filter(s => s.voteCount === topScore);
                const runners = yearData.filter(s => s.voteCount < topScore);

                const section = document.createElement('div');
                section.className = "exhibit-card";
                
                // Random subtle tilt for Aura
                const rot = (Math.random() * 1.4 - 0.7).toFixed(1);
                section.style.transform = `rotate(${rot}deg)`;

                // 1. LEADER UI
                let nameHTML = "";
                let titleHTML = "";
                let statusTag = "";
                let tiedNamesList = "";

                if (leaders.length === 1) {
                    nameHTML = leaders[0].artist;
                    titleHTML = `"${leaders[0].title || 'Untitled'}"`;
                    statusTag = 'LEADER';
                } else {
                    nameHTML = `${leaders.length}-WAY TIE`;
                    titleHTML = `VOTE TO BREAK THE LOCK`;
                    statusTag = 'TIE';
                    
                    const divider = `<span class="bauhaus-pointer">❖</span>`;
                    tiedNamesList = `
                        <div class="tied-names-box">
                            <span class="tied-label">TIED FOR #1:</span>
                            <span class="tied-list-names">${leaders.map(l => l.artist).join(divider)}</span>
                        </div>
                    `;
                }

                // 2. RUNNERS UI (CLEAN WHITE STYLE)
                let runnersHTML = "";
                if (runners.length > 0) {
                    runnersHTML = `<div class="runners-list-clean">`;
                    runners.slice(0, 4).forEach((s) => {
                        const realRank = yearData.filter(x => x.voteCount > s.voteCount).length + 1;
                        runnersHTML += `
                            <div class="runner-row-clean">

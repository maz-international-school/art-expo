<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE STANDINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow:hidden; cursor:none;">

    <!-- THE 3x3 LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">MAZ ART EXPO 2026</div>
            <div id="ticker-total-box" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 5px 25px; border: 4px solid white;">TOTAL: <span id="total-ticker">0</span></div>
        </div>

        <!-- BROADCAST STAGE (2 Columns) -->
        <div id="broadcast-stage" style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 40px;">
            <!-- Year Groups cycle here -->
        </div>

        <!-- FOOTER TICKER -->
        <div style="background: var(--blue); color: white; height: 70px; overflow: hidden; display: flex; align-items: center; border-top: 8px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 3px;">
                START VOTING • MAY THE BEST ARTWORK WIN • WAIT FOR YOUR YEAR TO POP UP! • CAST YOUR VOTE VIA THE OFFICIAL QR CODE • 
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        let currentPairIndex = 0;
        let allData = [];
        let autoCycle;

        db.collection('artworks').onSnapshot(snap => {
            allData = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            let total = 0;
            allData.forEach(d => total += (d.voteCount || 0));
            document.getElementById('total-ticker').innerText = total;
            renderStage();
        });

        function nextSlide() {
            currentPairIndex += 2;
            if (currentPairIndex >= groups.length) currentPairIndex = 0;
            renderStage();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(autoCycle);
            autoCycle = setInterval(nextSlide, 10000); 
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === "Space") { nextSlide(); }
        });

        resetTimer();

        function renderStage() {
            const stage = document.getElementById('broadcast-stage');
            stage.innerHTML = "";
            const pair = [groups[currentPairIndex], groups[currentPairIndex + 1]].filter(Boolean);

            pair.forEach(g => {
                const students = allData.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                        .sort((a,b) => b.voteCount - a.voteCount);

                const col = document.createElement('div');
                col.className = "stage-column-new";
                
                let inner = `<div class="stage-header-new" style="background:${getCol(g.c)}; color:${g.c==='secondary'?'black':'white'}">${g.l}</div>`;

                if (students.length === 0) {
                    inner += `<div style="margin:auto; opacity:0.1; text-align:center; transform:rotate(-5deg);"><h2 style="font-family:'Archivo Black'; font-size:4rem;">AWAITING<br>FIRST VOTE</h2></div>`;
                } else {
                    const top = students[0];
                    inner += `
                        <div class="hero-box">
                            <div class="hero-label">LEADER</div>
                            <div class="hero-main-row">
                                <div class="hero-info">
                                    <div class="hero-name">${top.artist}</div>
                                    <div class="hero-title">${top.title || 'Untitled'}</div>
                                </div>
                                <div class="hero-votes-box">
                                    <span class="v-num">${top.voteCount}</span>
                                    <span class="v-label">VOTES</span>
                                </div>
                            </div>
                        </div>
                    `;

                    if (students.length > 1) {
                        inner += `<div class="runners-list">`;
                        students.slice(1, 4).forEach((s, i) => {
                            inner += `<div class="runner-item"><span>#${i+2} ${s.artist}</span><span>${s.voteCount}</span></div>`;
                        });
                        inner += `</div>`;
                    }
                }
                col.innerHTML = inner;
                stage.appendChild(col);
            });
        }

        function getCol(c) {
            if(c === 'kindergarten') return 'var(--red)';
            if(c === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        .stage-column-new { display: flex; flex-direction: column; background: white; border: 8px solid var(--black); box-shadow: 20px 20px 0px var(--black); animation: slam 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .stage-header-new { font-family: 'Archivo Black'; font-size: 2.8rem; text-align: center; padding: 15px; border-bottom: 8px solid var(--black); }
        
        .hero-box { padding: 40px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .hero-label { font-family: 'Archivo Black'; font-size: 0.9rem; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.3; }
        
        .hero-main-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        .hero-info { flex: 1; }
        .hero-name { font-family: 'Archivo Black'; font-size: 4rem; line-height: 1; text-transform: uppercase; }
        .hero-title { font-weight: 700; font-size: 1.5rem; opacity: 0.4; text-transform: uppercase; margin-top: 10px; }
        
        .hero-votes-box { display: flex; align-items: baseline; gap: 10px; }
        .v-num { font-family: 'Archivo Black'; font-size: 8rem; line-height: 0.8; }
        .v-label { font-family: 'Archivo Black'; font-size: 1.2rem; }

        .runners-list { background: white; border-top: 6px solid var(--black); padding: 20px 40px; display: flex; flex-direction: column; gap: 10px; }
        .runner-item { display: flex; justify-content: space-between; font-weight: 900; text-transform: uppercase; font-size: 1.3rem; border-bottom: 2px solid #eee; padding-bottom: 5px; }

        @keyframes slam { from { transform: scale(1.2); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .scrolling-text { white-space: nowrap; animation: scroll-left 25s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE STANDINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow-y: auto; cursor: none;">

    <!-- ABSTRACT DECORATIVE ELEMENTS -->
    <div class="abstract-layer">
        <div class="abs-shape circle-hollow"></div>
        <div class="abs-shape square-solid"></div>
        <div class="abs-shape line-diagonal"></div>
        <div class="abs-shape line-horizontal"></div>
        <div class="abs-shape dot-pattern"></div>
    </div>

    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="min-height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- HEADER -->
        <div style="background: var(--black); color: white; padding: 20px 50px; display: flex; justify-content: space-between; align-items: center; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3.5rem; letter-spacing: -2px;">ART EXPO 2026</div>
            <div id="ticker-total" style="font-family: 'Archivo Black'; font-size: 2.2rem; background: var(--yellow); color: var(--black); padding: 5px 25px; border: 4px solid white;">TOTAL: 0</div>
        </div>

        <!-- 13-PRIZE GRID -->
        <div id="champion-wall" style="flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 30px; background: transparent;">
            <!-- Year Groups injected here -->
        </div>

        <div style="background: var(--blue); color: white; height: 50px; overflow: hidden; display: flex; align-items: center; border-top: 6px solid var(--black);">
            <div class="scrolling-text" style="font-family: 'Archivo Black'; font-size: 1.2rem; text-transform: uppercase;">
                LIVE EXHIBITION STANDINGS • JALAN KRISTAL SHAH ALAM • CAST YOUR VOTE VIA THE OFFICIAL EXPO LINK • SUPPORTING THE CREATIVE SPIRIT
            </div>
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const wall = document.getElementById('champion-wall');
            wall.innerHTML = "";
            let currentTotal = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year && a.year.toString().toUpperCase() === g.id);
                const sorted = students.sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                const topScore = sorted.length > 0 ? (sorted[0].voteCount || 0) : 0;
                students.forEach(s => currentTotal += (s.voteCount || 0));

                const leaders = sorted.filter(s => s.voteCount === topScore && topScore > 0);

                const card = document.createElement('div');
                card.className = "gallery-card";
                card.style.borderLeft = `10px solid ${getCol(g.c)}`;

                let nameHTML = "";
                let titleHTML = "";
                let tieBadge = "";

                if (topScore === 0) {
                    nameHTML = '<span style="opacity:0.15">---</span>';
                    titleHTML = "No votes cast";
                } else if (leaders.length === 1) {
                    nameHTML = leaders[0].artist;
                    titleHTML = leaders[0].title || "Untitled";
                } else {
                    nameHTML = "JOINT LEADERS";
                    titleHTML = `${leaders.length} Students Drawing`;
                    tieBadge = `<span style="background:var(--red); color:white; padding:2px 6px; font-size:0.6rem; margin-left:10px;">TIE</span>`;
                }

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                        <div class="card-label" style="color:${getCol(g.c)}">${g.l}</div>
                        ${tieBadge}
                    </div>
                    <div class="card-content">
                        <div class="winner-name">${nameHTML}</div>
                        <div class="winner-title">${titleHTML}</div>
                    </div>
                    <div class="card-footer">
                        <div class="vote-badge">${topScore}</div>
                        <div class="booth-tag">${leaders.length === 1 ? leaders[0].id : ''}</div>
                    </div>
                `;
                wall.appendChild(card);
            });
            document.getElementById('ticker-total').innerText = currentTotal;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        /* ABSTRACT ELEMENTS STYLING */
        .abstract-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        .abs-shape { position: absolute; opacity: 0.1; }
        
        .circle-hollow { 
            width: 300px; height: 300px; border: 40px solid var(--blue); border-radius: 50%; 
            top: -100px; right: -50px; animation: float 25s infinite linear;
        }

        .square-solid {
            width: 150px; height: 150px; background: var(--yellow);
            bottom: 10%; left: 5%; transform: rotate(15deg); animation: float 18s infinite ease-in-out;
        }

        .line-diagonal {
            width: 1000px; height: 20px; background: var(--red);
            top: 40%; left: -200px; transform: rotate(-35deg);
        }

        .line-horizontal {
            width: 100%; height: 2px; background: var(--black);
            top: 20%; opacity: 0.05;
        }

        .dot-pattern {
            width: 200px; height: 200px;
            background-image: radial-gradient(var(--black) 2px, transparent 2px);
            background-size: 20px 20px;
            top: 50%; right: 10%; opacity: 0.05;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, -40px) rotate(10deg); }
        }

        /* CARD STYLING */
        .gallery-card { 
            background: white; border: 4px solid var(--black); box-shadow: 10px 10px 0px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; padding: 15px; min-height: 180px; box-sizing: border-box;
            animation: slideUp 0.6s ease-out backwards;
        }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .card-label { font-family: 'Archivo Black'; font-size: 0.9rem; margin-bottom: 10px; }
        .winner-name { font-weight: 900; font-size: 1.4rem; line-height: 1.1; text-transform: uppercase; }
        .winner-title { font-size: 0.7rem; opacity: 0.5; font-weight: 700; margin-top: 5px; text-transform: uppercase; }
        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 15px; }
        .vote-badge { font-family: 'Archivo Black'; font-size: 2.2rem; line-height: 0.8; }
        .booth-tag { font-size: 0.6rem; background: var(--black); color: white; padding: 3px 8px; font-weight: 900; }
        
        .scrolling-text { white-space: nowrap; animation: scroll-left 40s linear infinite; padding-left: 100%; }
        @keyframes scroll-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>MAZ ART EXPO 2026</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background:var(--white); padding:0; overflow:hidden; cursor:none;">
    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="height:100vh; display:flex; flex-direction:column;">
        <!-- HEADER -->
        <div style="background:var(--black); color:white; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; border-bottom:8px solid var(--red);">
            <h1 style="color:white; font-size:2.5rem; margin:0;">EXPO 2026 LEADERBOARD</h1>
            <div id="ticker" style="background:var(--yellow); color:black; padding:5px 20px; font-family:'Archivo Black'; font-size:1.5rem;">TOTAL VOTES: 0</div>
        </div>

        <!-- 13 CHAMPION GRID -->
        <div id="champion-grid" style="flex:1; display:grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(3, 1fr); gap:10px; padding:15px; background:var(--black);">
            <!-- Year Groups will be injected here -->
        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const yearGroups = [
            {id: 'KG1', cat: 'kindergarten', label: 'KG 1'},
            {id: 'KG2', cat: 'kindergarten', label: 'KG 2'},
            {id: 'Y1', cat: 'primary', label: 'Year 1'},
            {id: 'Y2', cat: 'primary', label: 'Year 2'},
            {id: 'Y3', cat: 'primary', label: 'Year 3'},
            {id: 'Y4', cat: 'primary', label: 'Year 4'},
            {id: 'Y5', cat: 'primary', label: 'Year 5'},
            {id: 'Y6', cat: 'primary', label: 'Year 6'},
            {id: 'Y7', cat: 'secondary', label: 'Year 7'},
            {id: 'Y8', cat: 'secondary', label: 'Year 8'},
            {id: 'Y9', cat: 'secondary', label: 'Year 9'},
            {id: 'Y10', cat: 'secondary', label: 'Year 10'},
            {id: 'Y11', cat: 'secondary', label: 'Year 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
            const grid = document.getElementById('champion-grid');
            grid.innerHTML = "";
            let total = 0;

            yearGroups.forEach(group => {
                const students = data.filter(a => a.year === group.id).sort((a,b) => b.voteCount - a.voteCount);
                const winner = students.length > 0 && students[0].voteCount > 0 ? students[0] : null;
                
                // Add to total
                students.forEach(s => total += (s.voteCount || 0));

                const card = document.createElement('div');
                card.className = "card";
                card.style.margin = "0";
                card.style.padding = "15px";
                card.style.display = "flex";
                card.style.flexDirection = "column";
                card.style.justifyContent = "space-between";
                card.style.borderWidth = "4px";
                card.style.boxShadow = "5px 5px 0px " + getCol(group.cat);

                card.innerHTML = `
                    <div style="font-family:'Archivo Black'; font-size:0.8rem; background:${getCol(group.cat)}; color:${group.cat==='secondary'?'black':'white'}; padding:2px 5px; display:inline-block; width:fit-content;">${group.label}</div>
                    <div style="margin:10px 0;">
                        <div style="font-weight:900; font-size:1.1rem; line-height:1.1; text-transform:uppercase;">${winner ? winner.artist : '---'}</div>
                        <div style="font-size:0.6rem; opacity:0.6;">${winner ? winner.title : 'No votes yet'}</div>
                    </div>
                    <div style="font-family:'Archivo Black'; font-size:1.5rem; text-align:right; color:${getCol(group.cat)}">${winner ? winner.voteCount : 0}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('ticker').innerText = "TOTAL VOTES: " + total;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Standings | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="dotted-bg">

    <!-- BOLD ABSTRACT DESIGN LAYER (Behind Content) -->
    <div class="aura-background">
        <div class="aura-shape aura-circle"></div>
        <div class="aura-shape aura-square"></div>
        <div class="aura-shape aura-triangle"></div>
        <div class="aura-line aura-line-1"></div>
        <div class="aura-line aura-line-2"></div>
        <div class="aura-line aura-line-3"></div>
    </div>

    <!-- THE 3x3 LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="results-wrapper">
        <!-- CLEAN HEADER SECTION -->
        <header class="results-header">
            <div class="header-main">
                <h1>MAZ ART EXPO 2026</h1>
            </div>
            <div id="ticker-box">
                LIVE ACTIVITY TALLIED: <span id="master-total">0</span> VOTES
            </div>
        </header>

        <!-- SCROLLABLE STANDINGS FEED -->
        <main id="standings-feed">
            <!-- Year Groups with >0 votes will appear here -->
        </main>

        <!-- FOOTER INFO -->
        <footer style="margin-top: 50px; text-align: center; padding-bottom: 40px;">
            <p style="font-family: 'Archivo Black'; font-size: 0.7rem; opacity: 0.3; text-transform: uppercase; letter-spacing: 2px;">
                Secure Real-Time Data Stream • On-Site Verification Active
            </p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l : 'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;
            let activeGroupsCount = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                    .sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                students.forEach(s => globalTotal += (s.voteCount || 0));

                if (students.length === 0) return;

                activeGroupsCount++;
                const topScore = students[0].voteCount;
                const leaders = students.filter(s => s.voteCount === topScore);

                const section = document.createElement('section');
                section.className = "year-block";

                const top = students[0];
                const leaderHTML = `
                    <div class="leader-row">
                        <div class="leader-info">
                            <span class="label" style="color:${getCol(g.c)}">
                                ${leaders.length > 1 ? "JOINT LEADERS" : "CURRENT LEADER"}
                                ${leaders.length > 1 ? '<span class="tie-badge">TIE</span>' : ""}
                            </span>
                            <div class="leader-name">${leaders.length > 1 ? leaders.map(l => l.artist).join(" & ") : top.artist}</div>
                            <div class="leader-title">${leaders.length === 1 ? (top.title || "Untitled") : leaders.length + " students tied for 1st"}</div>
                        </div>
                        <div class="leader-score" style="color:${getCol(g.c)}">${topScore}</div>
                    </div>
                `;

                const runners = students.filter(s => s.voteCount < topScore);
                let listHTML = "";
                if (runners.length > 0) {
                    listHTML = `<div class="rank-list">`;
                    runners.slice(0, 5).forEach((s, i) => {
                        listHTML += `
                            <div class="rank-item">
                                <span>#${leaders.length + i + 1} ${s.artist}</span>
                                <b>${s.voteCount}</b>
                            </div>
                        `;
                    });
                    listHTML += `</div>`;
                }

                section.innerHTML = `
                    <div class="year-tag" style="background:${getCol(g.c)}">${g.l}</div>
                    <div class="content-box">
                        ${leaderHTML}
                        ${listHTML}
                    </div>
                `;
                feed.appendChild(section);
            });

            if (activeGroupsCount === 0) {
                feed.innerHTML = `
                    <div class="no-votes-global">
                        <h2 style="font-family:'Archivo Black'; font-size:3rem; line-height:1;">AWAITING<br>FIRST SELECTION</h2>
                    </div>
                `;
            }

            document.getElementById('master-total').innerText = globalTotal;
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

    <style>
        /* DOTTED BACKGROUND */
        .dotted-bg {
            background-color: #ffffff;
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* BOLD ABSTRACT BACKGROUND ELEMENTS */
        .aura-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .aura-shape { position: absolute; opacity: 0.35; } /* Higher visibility for LED */
        
        .aura-circle { width: 450px; height: 450px; background: #5AC8FA; border-radius: 50%; top: -100px; right: -50px; animation: aura-drift 20s infinite linear; }
        .aura-square { width: 220px; height: 220px; border: 35px solid var(--yellow); bottom: 15%; left: 5%; transform: rotate(15deg); animation: aura-drift 15s infinite reverse ease-in-out; }
        .aura-triangle { 
            width: 0; height: 0; border-left: 140px solid transparent; border-right: 140px solid transparent; border-bottom: 240px solid var(--red);
            top: 25%; left: 8%; opacity: 0.25; transform: rotate(-25deg);
        }
        
        /* HEAVY INK LINES */
        .aura-line { position: absolute; background: var(--black); opacity: 0.2; }
        .aura-line-1 { width: 1200px; height: 12px; top: 45%; left: -200px; transform: rotate(-30deg); }
        .aura-line-2 { width: 100%; height: 6px; top: 12%; left: 0; }
        .aura-line-3 { width: 12px; height: 100%; left: 18%; top: 0; }

        @keyframes aura-drift {
            0% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(30px, 30px) rotate(5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .results-wrapper { position: relative; z-index: 2; max-width: 900px; margin: 0 auto; padding: 60px 20px; }

        /* CLEAN HEADER */
        .results-header { margin-bottom: 60px; text-align: center; }
        .header-main { display: inline-block; }
        h1 { font-family: 'Archivo Black'; font-size: 3.5rem; margin: 0; letter-spacing: -2px; line-height: 1; }
        h1::before { content: ''; display: inline-block; width: 15px; height: 50px; background: var(--red); margin-right: 15px; vertical-align: middle; }
        #ticker-box { font-family: 'Archivo Black'; font-size: 1.2rem; margin-top: 20px; color: var(--black); opacity: 0.6; }

        /* FEED LAYOUT */
        #standings-feed { display: flex; flex-direction: column; gap: 50px; }
        .year-block { position: relative; animation: slideUp 0.6s ease-out backwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .year-tag { font-family: 'Archivo Black'; color: white; display: inline-block; padding: 10px 25px; font-size: 1.3rem; margin-bottom: -5px; position: relative; z-index: 2; border: 4px solid var(--black); }
        .content-box { background: white; border: 5px solid var(--black); box-shadow: 15px 15px 0px rgba(0,0,0,0.05); padding: 35px; }

        /* LEADER STYLES */
        .leader-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; }
        .label { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .tie-badge { background: var(--red); color: white; padding: 2px 6px; margin-left: 10px; }
        .leader-name { font-family: 'Archivo Black'; font-size: 2.5rem; text-transform: uppercase; line-height: 1.1; margin: 10px 0; }
        .leader-title { font-weight: 700; opacity: 0.4; text-transform: uppercase; font-size: 0.9rem; }
        .leader-score { font-family: 'Archivo Black'; font-size: 5rem; line-height: 1; }

        /* LIST STYLES */
        .rank-list { margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 2px solid #eee; padding-top: 25px; }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        .no-votes-global { padding: 100px 0; text-align: center; opacity: 0.15; }

        @media (max-width: 600px) {
            .rank-list { grid-template-columns: 1fr; }
            .leader-name { font-size: 1.6rem; }
            .leader-score { font-size: 3rem; }
            h1 { font-size: 2.2rem; }
            h1::before { height: 35px; width: 10px; }
        }
    </style>
</body>
</html>

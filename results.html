<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Ranking | Maz Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesque:wght@700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="background: #000; margin: 0; padding: 0; overflow: hidden; cursor: none;">

    <!-- THE LED LOGO (Bottom Right) -->
    <img src="image1.png" class="school-logo" style="width: 180px; height: 180px; opacity: 1; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));">

    <!-- MAIN BROADCAST LAYOUT -->
    <div style="height: 100vh; display: flex; flex-direction: column; background: #000;">
        
        <!-- TOP TICKER BAR -->
        <div style="background: var(--red); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid #fff;">
            <div style="font-family: 'Archivo Black'; font-size: 2.5rem; letter-spacing: 5px;">LIVE RANKINGS</div>
            <div id="total-ticker" style="font-family: 'Archivo Black'; font-size: 2rem;">VOTES: 0</div>
        </div>

        <!-- THE GRID -->
        <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 20px; box-sizing: border-box;">
            
            <!-- KINDERGARTEN -->
            <div class="led-column">
                <div class="led-header" style="border-left: 15px solid var(--red);">KINDERGARTEN</div>
                <div id="chart-kindergarten" class="list-container"></div>
            </div>

            <!-- PRIMARY -->
            <div class="led-column">
                <div class="led-header" style="border-left: 15px solid var(--blue);">PRIMARY</div>
                <div id="chart-primary" class="list-container"></div>
            </div>

            <!-- SECONDARY -->
            <div class="led-column">
                <div class="led-header" style="border-left: 15px solid var(--yellow);">SECONDARY</div>
                <div id="chart-secondary" class="list-container"></div>
            </div>

        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            let totalVotes = 0;

            ['kindergarten', 'primary', 'secondary'].forEach(cat => {
                const out = document.getElementById(`chart-${cat}`);
                out.innerHTML = "";
                
                const list = data.filter(a => a.category === cat)
                                 .sort((a,b) => b.voteCount - a.voteCount)
                                 .slice(0, 5); // Top 5 per category

                if(list.length > 0) {
                    const max = Math.max(...list.map(a => a.voteCount), 1);
                    list.forEach((art, i) => {
                        totalVotes += art.voteCount;
                        const pct = (art.voteCount / max) * 100;
                        const isFirst = i === 0 && art.voteCount > 0;
                        
                        const row = document.createElement('div');
                        row.className = `led-row ${isFirst ? 'crown' : ''}`;
                        row.innerHTML = `
                            <div class="led-rank">0${i+1}</div>
                            <div class="led-data">
                                <div class="led-name">${art.artist}</div>
                                <div class="led-bar-box">
                                    <div class="led-bar-fill" style="width:${pct}%; background:${getCol(cat)}"></div>
                                    <div class="led-count">${art.voteCount}</div>
                                </div>
                            </div>
                        `;
                        out.appendChild(row);
                    });
                }
            });
            document.getElementById('total-ticker').innerText = "TOTAL VOTES: " + totalVotes;
        });

        function getCol(cat) {
            if(cat === 'kindergarten') return '#e63946';
            if(cat === 'primary') return '#1d3557';
            return '#ffb703';
        }
    </script>

    <style>
        .led-column { background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1); padding: 10px; display: flex; flex-direction: column; }
        .led-header { font-family: 'Archivo Black'; font-size: 1.8rem; color: #fff; padding: 15px; background: rgba(255,255,255,0.05); margin-bottom: 20px; }
        
        .list-container { flex: 1; display: flex; flex-direction: column; gap: 20px; padding: 10px; }
        
        .led-row { display: flex; align-items: flex-end; gap: 15px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .led-rank { font-family: 'Archivo Black'; font-size: 2.5rem; color: rgba(255,255,255,0.2); line-height: 1; }
        .led-data { flex: 1; }
        .led-name { font-family: 'Space Grotesque'; font-size: 1.4rem; color: #fff; text-transform: uppercase; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .led-bar-box { height: 40px; background: #222; position: relative; border: 1px solid #444; }
        .led-bar-fill { height: 100%; transition: width 2s cubic-bezier(0.23, 1, 0.32, 1); box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .led-count { position: absolute; right: 15px; top: 5px; font-family: 'Archivo Black'; font-size: 1.5rem; color: #fff; text-shadow: 2px 2px 5px #000; }

        .crown { background: rgba(255, 255, 255, 0.08); border: 2px solid var(--yellow); transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 183, 3, 0.2); }
        .crown .led-rank { color: var(--yellow); }
        .crown .led-name { font-weight: 900; letter-spacing: 1px; }

        @keyframes scanline {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 5px; 
            background: rgba(255,255,255,0.03); animation: scanline 8s linear infinite; pointer-events: none;
        }
    </style>
</body>
</html>

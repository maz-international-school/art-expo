<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ ART EXPO | LIVE RANKINGS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body style="display: block; padding: 0; overflow: hidden; cursor: none;">

    <!-- THE 3x3 COLOR LOGO (Stays in the corner) -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div style="height: 100vh; display: flex; flex-direction: column; position: relative; z-index: 2;">
        
        <!-- TOP BROADCAST BAR -->
        <div style="display: flex; justify-content: space-between; align-items: center; background: var(--black); color: white; padding: 20px 40px; border-bottom: 10px solid var(--red);">
            <div style="font-family: 'Archivo Black'; font-size: 3rem; letter-spacing: -2px;">ART EXPO 2026</div>
            <div id="total-votes-ticker" style="font-family: 'Archivo Black'; font-size: 2rem; background: var(--yellow); color: var(--black); padding: 5px 20px;">TOTAL VOTES: 0</div>
        </div>

        <!-- THE TRI-GRID LAYOUT -->
        <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr 1fr; background: transparent;">
            
            <!-- KINDERGARTEN -->
            <div style="border-right: 6px solid var(--black); display: flex; flex-direction: column;">
                <div style="background: var(--red); color: white; font-family: 'Archivo Black'; font-size: 2.2rem; padding: 20px; text-align: center; border-bottom: 6px solid var(--black);">KINDERGARTEN</div>
                <div id="chart-kindergarten" class="led-list"></div>
            </div>

            <!-- PRIMARY -->
            <div style="border-right: 6px solid var(--black); display: flex; flex-direction: column;">
                <div style="background: var(--blue); color: white; font-family: 'Archivo Black'; font-size: 2.2rem; padding: 20px; text-align: center; border-bottom: 6px solid var(--black);">PRIMARY</div>
                <div id="chart-primary" class="led-list"></div>
            </div>

            <!-- SECONDARY -->
            <div style="display: flex; flex-direction: column;">
                <div style="background: var(--yellow); color: var(--black); font-family: 'Archivo Black'; font-size: 2.2rem; padding: 20px; text-align: center; border-bottom: 6px solid var(--black);">SECONDARY</div>
                <div id="chart-secondary" class="led-list"></div>
            </div>

        </div>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            let globalTotal = 0;

            ['kindergarten', 'primary', 'secondary'].forEach(cat => {
                const out = document.getElementById(`chart-${cat}`);
                out.innerHTML = "";
                
                const list = data.filter(a => a.category === cat)
                                 .sort((a,b) => b.voteCount - a.voteCount)
                                 .slice(0, 6); // Top 6 looks best on big screen

                if(list.length > 0) {
                    const max = Math.max(...list.map(a => a.voteCount), 1);
                    list.forEach((art, i) => {
                        globalTotal += art.voteCount;
                        const pct = (art.voteCount / max) * 100;
                        
                        const row = document.createElement('div');
                        row.className = "led-row";
                        row.innerHTML = `
                            <div class="artist-label">
                                <span class="rank">#${i+1}</span> ${art.artist}
                            </div>
                            <div class="bar-container">
                                <div class="bar-fill" style="width: ${pct}%; background: ${getCatColor(cat)}"></div>
                                <div class="vote-number">${art.voteCount}</div>
                            </div>
                        `;
                        out.appendChild(row);
                    });
                }
            });
            document.getElementById('total-votes-ticker').innerText = "TOTAL VOTES: " + globalTotal;
        });

        function getCatColor(cat) {
            if(cat === 'kindergarten') return 'var(--red)';
            if(cat === 'primary') return 'var(--blue)';
            return 'var(--yellow)';
        }
    </script>

    <style>
        /* Re-using your main CSS variables and grid */
        .led-list { padding: 30px; flex: 1; display: flex; flex-direction: column; gap: 25px; background: transparent; }
        
        .led-row { display: flex; flex-direction: column; gap: 8px; }
        
        .artist-label { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 1.4rem; 
            text-transform: uppercase;
            color: var(--black);
        }
        .rank { color: var(--red); margin-right: 10px; }

        .bar-container { 
            height: 45px; 
            border: 5px solid var(--black); 
            background: white; 
            position: relative; 
            display: flex; 
            align-items: center;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.1);
        }
        
        .bar-fill { 
            height: 100%; 
            transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); 
            border-right: 5px solid var(--black);
        }
        
        .vote-number { 
            position: absolute; 
            right: 15px; 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 1.8rem; 
            color: var(--black);
        }

        /* Keep the 3x3 logo consistent */
        .school-logo {
            z-index: 1; /* Behind the bars */
        }
    </style>
</body>
</html>

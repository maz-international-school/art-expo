<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Standings | Art Expo 2026</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="dotted-bg">

    <!-- THE 3x3 LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="results-wrapper">
        <!-- HEADER SECTION -->
        <header class="results-header">
            <div class="header-main">
                <div class="blue-block"></div>
                <h1>MAZ ART EXPO 2026</h1>
                <div class="tilted-line"></div>
            </div>
            <div id="ticker-box">
                LIVE ACTIVITY TALLIED: <span id="master-total">0</span> VOTES
            </div>
        </header>

        <!-- SCROLLABLE STANDINGS FEED -->
        <main id="standings-feed">
            <!-- Year Groups injected here -->
        </main>

        <!-- FOOTER INFO -->
        <footer style="margin-top: 50px; text-align: center; padding-bottom: 40px;">
            <p style="font-family: 'Archivo Black'; font-size: 0.7rem; opacity: 0.3; text-transform: uppercase; letter-spacing: 2px;">
                Secure Real-Time Data Stream • On-Site Verification Active
            </p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id).sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                // Track total votes
                students.forEach(s => globalTotal += (s.voteCount || 0));

                const hasVotes = students.length > 0 && students[0].voteCount > 0;
                const topScore = hasVotes ? students[0].voteCount : 0;
                const leaders = students.filter(s => s.voteCount === topScore && topScore > 0);

                const section = document.createElement('section');
                section.className = "year-block";

                let leaderHTML = "";
                let tieLabel = leaders.length > 1 ? `<span class="tie-badge">TIE</span>` : "";

                if (!hasVotes) {
                    leaderHTML = `<div class="no-votes">AWAITING SELECTION...</div>`;
                } else {
                    const top = students[0];
                    leaderHTML = `
                        <div class="leader-row">
                            <div class="leader-info">
                                <span class="label" style="color:${getCol(g.c)}">CURRENT LEADER ${tieLabel}</span>
                                <div class="leader-name">${leaders.length > 1 ? "JOINT LEADERS" : top.artist}</div>
                                <div class="leader-title">${leaders.length > 1 ? leaders.length + " students tied" : (top.title || "Untitled")}</div>
                            </div>
                            <div class="leader-score" style="color:${getCol(g.c)}">${topScore}</div>
                        </div>
                    `;
                }

                // Top 5 Runners Up
                let listHTML = "";
                if (students.length > leaders.length && hasVotes) {
                    listHTML = `<div class="rank-list">`;
                    students.slice(leaders.length, leaders.length + 4).forEach((s, i) => {
                        listHTML += `
                            <div class="rank-item">
                                <span>#${leaders.length + i + 1} ${s.artist}</span>
                                <b>${s.voteCount}</b>
                            </div>
                        `;
                    });
                    listHTML += `</div>`;
                }

                section.innerHTML = `
                    <div class="year-tag" style="background:${getCol(g.c)}">${g.l}</div>
                    <div class="content-box">
                        ${leaderHTML}
                        ${listHTML}
                    </div>
                `;
                feed.appendChild(section);
            });
            document.getElementById('master-total').innerText = globalTotal;
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

    <style>
        /* DOTTED BACKGROUND */
        .dotted-bg {
            background-color: #ffffff;
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .results-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }

        /* HEADER */
        .results-header { margin-bottom: 60px; }
        .header-main { position: relative; display: inline-block; }
        
        .blue-block { 
            position: absolute; left: -50px; top: -10px;
            width: 80px; height: 80px; 
            background: #5AC8FA; border-radius: 22px; z-index: -1; 
        }

        h1 { font-family: 'Archivo Black'; font-size: 3.5rem; margin: 0; letter-spacing: -2px; line-height: 1; }

        .tilted-line { 
            width: 200px; height: 6px; background: #000; 
            transform: rotate(1.5deg); margin-top: 5px; 
        }

        #ticker-box { font-family: 'Archivo Black'; font-size: 1.2rem; margin-top: 25px; color: var(--black); opacity: 0.6; }

        /* FEED LAYOUT */
        #standings-feed { display: flex; flex-direction: column; gap: 50px; }
        
        .year-block { position: relative; animation: slideUp 0.6s ease-out backwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .year-tag {
            font-family: 'Archivo Black';
            color: white;
            display: inline-block;
            padding: 10px 25px;
            font-size: 1.3rem;
            margin-bottom: -5px;
            position: relative;
            z-index: 2;
            border: 4px solid var(--black);
        }

        .content-box {
            background: white;
            border: 5px solid var(--black);
            box-shadow: 15px 15px 0px rgba(0,0,0,0.05);
            padding: 35px;
        }

        /* LEADER STYLES */
        .leader-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; }
        .label { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; }
        .tie-badge { background: var(--red); color: white; padding: 2px 6px; margin-left: 10px; }
        .leader-name { font-family: 'Archivo Black'; font-size: 2.5rem; text-transform: uppercase; line-height: 1.1; margin: 10px 0; }
        .leader-title { font-weight: 700; opacity: 0.4; text-transform: uppercase; font-size: 0.95rem; }
        .leader-score { font-family: 'Archivo Black'; font-size: 5rem; line-height: 1; }

        /* LIST STYLES */
        .rank-list { 
            margin-top: 25px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            border-top: 2px solid #eee;
            padding-top: 25px;
        }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }
        
        .no-votes { padding: 50px 0; text-align: center; font-family: 'Archivo Black'; opacity: 0.1; font-size: 2.5rem; transform: rotate(-2deg); }

        @media (max-width: 600px) {
            .rank-list { grid-template-columns: 1fr; }
            .leader-name { font-size: 1.8rem; }
            .leader-score { font-size: 3rem; }
            h1 { font-size: 2.2rem; }
            .blue-block { left: -20px; width: 60px; height: 60px; }
        }
    </style>
</body>
</html>

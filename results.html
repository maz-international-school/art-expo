<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ART EXPO 2026 | LIVE POLLS</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="pastel-bauhaus-bg">

    <!-- THE WAVY AURA LAYER (Matches the Museum Image) -->
    <div class="aura-container">
        <div class="aura-wave wave-mint"></div>
        <div class="aura-wave wave-peach"></div>
        <div class="aura-wave wave-lavender"></div>
    </div>

    <!-- THE 3x3 LOGO ANCHOR -->
    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="results-wrapper">
        <!-- HEADER SECTION -->
        <header class="results-header">
            <div class="header-main">
                <h1>MAZ ART EXPO 2026</h1>
            </div>
            <div id="ticker-box">
                LIVE ACTIVITY TALLIED: <span id="master-total">0</span> VOTES
            </div>
        </header>

        <!-- SCROLLABLE STANDINGS FEED -->
        <main id="standings-feed">
            <!-- Year Groups with >0 votes will appear here -->
        </main>

        <!-- FOOTER INFO -->
        <footer style="margin-top: 50px; text-align: center; padding-bottom: 40px; position: relative; z-index: 5;">
            <p style="font-family: 'Archivo Black'; font-size: 0.7rem; color: #000; opacity: 0.3; text-transform: uppercase; letter-spacing: 2px;">
                Secure Real-Time Data Stream • On-Site Verification Active
            </p>
        </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;
            let activeGroupsCount = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id && (a.voteCount || 0) > 0)
                                    .sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                
                students.forEach(s => globalTotal += (s.voteCount || 0));

                if (students.length === 0) return;

                activeGroupsCount++;
                const topScore = students[0].voteCount;
                const leaders = students.filter(s => s.voteCount === topScore);

                const section = document.createElement('section');
                section.className = "year-block";

                const top = students[0];
                const leaderHTML = `
                    <div class="leader-row">
                        <div class="leader-info">
                            <span class="label" style="color:${getCol(g.c)}">
                                ${leaders.length > 1 ? "JOINT LEADERS" : "CURRENT LEADER"}
                                ${leaders.length > 1 ? '<span class="tie-badge">TIE</span>' : ""}
                            </span>
                            <div class="leader-name">${leaders.length > 1 ? leaders.map(l => l.artist).join(" & ") : top.artist}</div>
                            <div class="leader-title">${leaders.length === 1 ? (top.title || "Untitled") : leaders.length + " students tied for 1st"}</div>
                        </div>
                        <div class="leader-score" style="color:${getCol(g.c)}">${topScore}</div>
                    </div>
                `;

                const runners = students.filter(s => s.voteCount < topScore);
                let listHTML = "";
                if (runners.length > 0) {
                    listHTML = `<div class="rank-list">`;
                    runners.slice(0, 5).forEach((s, i) => {
                        listHTML += `
                            <div class="rank-item">
                                <span>#${leaders.length + i + 1} ${s.artist}</span>
                                <b>${s.voteCount}</b>
                            </div>
                        `;
                    });
                    listHTML += `</div>`;
                }

                section.innerHTML = `
                    <div class="year-tag" style="background:${getCol(g.c)}">${g.l}</div>
                    <div class="content-box">
                        ${leaderHTML}
                        ${listHTML}
                    </div>
                `;
                feed.appendChild(section);
            });

            if (activeGroupsCount === 0) {
                feed.innerHTML = `
                    <div class="no-votes-global">
                        <h2 style="font-family:'Archivo Black'; font-size:3rem; line-height:1;">AWAITING<br>FIRST SELECTION</h2>
                    </div>
                `;
            }

            document.getElementById('master-total').innerText = globalTotal;
        });

        function getCol(c){ return c==='kindergarten'?'var(--red)':c==='primary'?'var(--blue)':'var(--yellow)'; }
    </script>

    <style>
        /* BASE DOTTED GRID */
        .pastel-bauhaus-bg {
            background-color: #ffffff;
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* PASTEL WAVY SHAPES (Inspired by the Photo) */
        .aura-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .aura-wave { position: absolute; width: 800px; height: 800px; border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; opacity: 0.15; filter: blur(40px); animation: wave-float 25s infinite linear; }
        
        .wave-mint { background: #b9fbc0; top: -200px; left: -200px; }
        .wave-peach { background: #ffccbc; bottom: -100px; right: -100px; animation-duration: 20s; animation-direction: reverse; }
        .wave-lavender { background: #e1bee7; top: 30%; left: 50%; width: 400px; height: 400px; animation-duration: 30s; }

        @keyframes wave-float {
            0% { transform: translate(0,0) rotate(0deg) scale(1); }
            50% { transform: translate(100px, 50px) rotate(10deg) scale(1.1); }
            100% { transform: translate(0,0) rotate(0deg) scale(1); }
        }

        .results-wrapper { position: relative; z-index: 5; max-width: 900px; margin: 0 auto; padding: 60px 20px; }

        /* CLEAN HEADER */
        .results-header { margin-bottom: 60px; text-align: center; }
        h1 { font-family: 'Archivo Black'; font-size: 3.5rem; margin: 0; letter-spacing: -2px; line-height: 1; color: #000; }
        h1::before { content: ''; display: inline-block; width: 15px; height: 50px; background: var(--red); margin-right: 15px; vertical-align: middle; }
        #ticker-box { font-family: 'Archivo Black'; font-size: 1.2rem; margin-top: 20px; color: #000; opacity: 0.4; }

        /* CONTENT BLOCKS (BAUHAUS STABILITY) */
        #standings-feed { display: flex; flex-direction: column; gap: 50px; }
        .year-block { position: relative; animation: slideUp 0.6s ease-out backwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .year-tag {
            font-family: 'Archivo Black';
            color: white;
            display: inline-block;
            padding: 10px 25px;
            font-size: 1.3rem;
            margin-bottom: -5px;
            position: relative;
            z-index: 6;
            border: 4px solid #000;
        }

        .content-box {
            background: white;
            border: 5px solid #000;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.1); /* Slightly softer shadow for pastel vibe */
            padding: 35px;
        }

        /* LEADER STYLES */
        .leader-row { display: flex; justify-content: space-between; align-items: center; padding-bottom: 25px; }
        .label { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .tie-badge { background: var(--red); color: white; padding: 2px 6px; margin-left: 10px; }
        .leader-name { font-family: 'Archivo Black'; font-size: 2.5rem; text-transform: uppercase; line-height: 1.1; margin: 10px 0; color: #000; }
        .leader-title { font-weight: 700; opacity: 0.4; text-transform: uppercase; font-size: 0.9rem; color: #000; }
        .leader-score { font-family: 'Archivo Black'; font-size: 5rem; line-height: 1; }

        /* LIST STYLES */
        .rank-list { margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 2px solid #eee; padding-top: 25px; }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; padding: 8px 0; border-bottom: 1px solid #f5f5f5; color: #000; }
        
        .no-votes-global { padding: 100px 0; text-align: center; opacity: 0.15; color: #000; }

        @media (max-width: 600px) {
            .rank-list { grid-template-columns: 1fr; }
            .leader-name { font-size: 1.6rem; }
            .leader-score { font-size: 3rem; }
            h1 { font-size: 2.2rem; }
            h1::before { height: 35px; width: 10px; }
        }
    </style>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAZ Art Expo | Live Standings</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="dotted-bg">

    <img src="image1.png" class="school-logo" alt="Logo">

    <div class="results-wrapper">
        <!-- HEADER -->
        <header class="results-header">
            <div class="header-main">
                <div class="blue-block"></div>
                <h1>EXPO 2026 STANDINGS</h1>
                <div class="tilted-line"></div>
            </div>
            <div id="ticker-box">TOTAL VOTES: <span id="master-total">0</span></div>
        </header>

        <!-- SCROLLABLE FEED -->
        <main id="standings-feed">
            <!-- Year Groups will be generated here -->
        </main>
    </div>

    <script src="firebase-config.js"></script>
    <script>
        const groups = [
            {id:'KG1', c:'kindergarten', l:'KG 1'}, {id:'KG2', c:'kindergarten', l:'KG 2'},
            {id:'Y1', c:'primary', l:'YEAR 1'}, {id:'Y2', c:'primary', l:'YEAR 2'}, {id:'Y3', c:'primary', l:'YEAR 3'},
            {id:'Y4', c:'primary', l:'YEAR 4'}, {id:'Y5', c:'primary', l:'YEAR 5'}, {id:'Y6', c:'primary', l:'YEAR 6'},
            {id:'Y7', c:'secondary', l:'YEAR 7'}, {id:'Y8', c:'secondary', l:'YEAR 8'}, {id:'Y9', c:'secondary', l:'YEAR 9'},
            {id:'Y10', c:'secondary', l:'YEAR 10'}, {id:'Y11', c:'secondary', l:'YEAR 11'}
        ];

        db.collection('artworks').onSnapshot(snap => {
            const data = snap.docs.map(doc => ({id:doc.id, ...doc.data()}));
            const feed = document.getElementById('standings-feed');
            feed.innerHTML = "";
            let globalTotal = 0;

            groups.forEach((g) => {
                const students = data.filter(a => a.year === g.id).sort((a,b) => (b.voteCount || 0) - (a.voteCount || 0));
                students.forEach(s => globalTotal += (s.voteCount || 0));

                const hasVotes = students.length > 0 && students[0].voteCount > 0;
                const topScore = hasVotes ? students[0].voteCount : 0;
                const leaders = students.filter(s => s.voteCount === topScore && topScore > 0);

                const section = document.createElement('section');
                section.className = "year-block";

                let leaderHTML = "";
                if (!hasVotes) {
                    leaderHTML = `<div class="no-votes">AWAITING SELECTION...</div>`;
                } else {
                    const top = students[0];
                    leaderHTML = `
                        <div class="leader-row">
                            <div class="leader-info">
                                <span class="label">CURRENT LEADER</span>
                                <div class="leader-name">${leaders.length > 1 ? "JOINT LEADERS" : top.artist}</div>
                                <div class="leader-title">${leaders.length > 1 ? leaders.length + " students tied" : (top.title || "Untitled")}</div>
                            </div>
                            <div class="leader-score">${topScore}</div>
                        </div>
                    `;
                }

                // Top 5 List (excluding rank 1)
                let listHTML = "";
                if (students.length > 1 && hasVotes) {
                    listHTML = `<div class="rank-list">`;
                    students.slice(1, 5).forEach((s, i) => {
                        listHTML += `
                            <div class="rank-item">
                                <span>#${i+2} ${s.artist}</span>
                                <b>${s.voteCount}</b>
                            </div>
                        `;
                    });
                    listHTML += `</div>`;
                }

                section.innerHTML = `
                    <div class="year-tag">${g.l}</div>
                    <div class="content-box">
                        ${leaderHTML}
                        ${listHTML}
                    </div>
                `;
                feed.appendChild(section);
            });
            document.getElementById('master-total').innerText = globalTotal;
        });
    </script>

    <style>
        /* DOTTED GRID BACKGROUND */
        .dotted-bg {
            background-color: #ffffff;
            background-image: radial-gradient(#d1d1d1 1.5px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        .results-wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* HEADER STYLING */
        .header-main { position: relative; display: inline-block; margin-bottom: 20px; }
        
        .blue-block { 
            position: absolute; left: -60px; top: 0;
            width: 80px; height: 80px; 
            background: #5AC8FA; border-radius: 20px; z-index: -1; 
        }

        h1 { font-family: 'Archivo Black'; font-size: 3rem; margin: 0; letter-spacing: -1px; }

        .tilted-line { 
            width: 150px; height: 4px; background: #000; 
            transform: rotate(2deg); margin-top: -10px; 
        }

        #ticker-box { font-family: 'Archivo Black'; font-size: 1.5rem; margin-top: 10px; color: var(--red); }

        /* FEED BLOCKS */
        #standings-feed { margin-top: 50px; display: flex; flex-direction: column; gap: 40px; }

        .year-block { position: relative; }

        .year-tag {
            font-family: 'Archivo Black';
            background: var(--black);
            color: white;
            display: inline-block;
            padding: 8px 20px;
            font-size: 1.2rem;
            margin-bottom: -5px;
            position: relative;
            z-index: 2;
        }

        .content-box {
            background: white;
            border: 4px solid var(--black);
            box-shadow: 12px 12px 0px rgba(0,0,0,0.05);
            padding: 30px;
        }

        /* LEADER STYLE */
        .leader-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .label { font-size: 0.7rem; font-weight: 900; color: #5AC8FA; letter-spacing: 2px; }
        .leader-name { font-family: 'Archivo Black'; font-size: 2.2rem; text-transform: uppercase; line-height: 1; margin: 5px 0; }
        .leader-title { font-weight: 700; opacity: 0.4; text-transform: uppercase; font-size: 0.9rem; }
        .leader-score { font-family: 'Archivo Black'; font-size: 4rem; color: var(--red); }

        /* RANK LIST */
        .rank-list { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .rank-item { display: flex; justify-content: space-between; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
        
        .no-votes { padding: 40px 0; text-align: center; font-family: 'Archivo Black'; opacity: 0.1; font-size: 2rem; }

        @media (max-width: 600px) {
            .rank-list { grid-template-columns: 1fr; }
            .leader-name { font-size: 1.5rem; }
            .leader-score { font-size: 2.5rem; }
            .blue-block { left: -20px; width: 60px; height: 60px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</body>
</html>
